<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --surface-2: #1F1F1F; --text: #F0EDE8; --muted: #888; --green: #2ecc71; --red: #e74c3c; --border: rgba(255,255,255,0.08); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; text-align: left; }
        
        .app-header { background: var(--surface); padding: 10px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-admin { height: 40px; width: auto; }
        
        .tab-nav { display: flex; margin: 20px 32px 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 14px 22px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        
        .content-area { padding: 24px 32px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 16px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }
        
        /* RESTORED: Inventory and Pie Order Cards */
        .order-card { background: var(--surface-2); border-radius: 14px; padding: 18px; margin-bottom: 12px; text-align: left; }
        .inv-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: grab; gap: 12px; transition: background 0.2s; text-align: left; }
        .inv-row.dragging { opacity: 0.4; background: var(--orange); }
        .drag-handle { color: var(--muted); cursor: grab; flex-shrink: 0; }
        .inv-name-input { flex: 2; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 2px 4px; outline: none; }
        .inv-price-input { width: 70px; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--orange); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 2px 4px; outline: none; text-align: right; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-cancel { background: var(--red); color: white; }
        
        input, select, textarea { background: var(--surface-2); border: 1px solid var(--border); color: white; padding: 10px 12px; border-radius: 8px; width: 100%; font-family: 'DM Sans', sans-serif; }
        .hidden { display: none !important; }
        #login-gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .status-bar { margin: 20px 32px; background: var(--surface); border-radius: 14px; padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        
        /* Insights Specific Styling */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stats-tile { background: var(--surface-2); text-align: center; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .insights-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .insights-table th { text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; padding: 10px; border-bottom: 1px solid var(--border); }
        .insights-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="login-gate">
    <div style="width:320px;text-align:center;">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="width:220px; margin-bottom:30px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn btn-primary" id="login-btn" style="padding:14px;">Sign In</button>
        </div>
    </div>
</div>

<div id="admin-content" class="hidden">
    <header class="app-header">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-admin">
        <button class="btn" style="background:#2a2a2a;color:white;" id="logout-btn">Logout</button>
    </header>

    <div class="status-bar">
        <div>Shop Status: <strong id="status-text">...</strong></div>
        <button class="btn btn-primary" id="toggle-shop-btn">Toggle Shop Status</button>
    </div>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">Live Orders</button>
        <button class="tab-btn" data-tab="pies">Pie Batch</button>
        <button class="tab-btn" data-tab="menu">Inventory</button>
        <button class="tab-btn" data-tab="insights">Insights</button>
    </nav>

    <div class="content-area">
        <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

        <div id="tab-pies" class="tab-panel hidden">
            <div class="card" style="border-color:var(--orange)">
                <h3>Collection Dates Manager</h3>
                <div style="display:grid; grid-template-columns: 1fr 100px auto; gap:10px; margin:16px 0;">
                    <input type="text" id="new-pie-date" placeholder="e.g. Friday 17th April">
                    <input type="text" id="new-pie-times" placeholder="9am - 5pm">
                    <button class="btn btn-primary" id="add-date-btn">Add Date</button>
                </div>
                <div id="dates-list-admin"></div>
            </div>
        </div>

        <div id="tab-menu" class="tab-panel hidden">
            <div class="card">
                <h3>Categories</h3>
                <div id="cat-tags-list" style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;"></div>
                <div style="display:flex;gap:10px;">
                    <input type="text" id="new-cat-name" placeholder="New category">
                    <button class="btn btn-primary" id="add-cat-btn">Add</button>
                </div>
            </div>
            <div class="card">
                <h3>Add Item</h3>
                <div style="display:grid;grid-template-columns:1fr 120px 1fr;gap:10px;margin-bottom:12px;">
                    <input type="text" id="new-name" placeholder="Item name">
                    <input type="number" id="new-price" placeholder="Price £" step="0.01">
                    <select id="new-cat"><option value="">Select category…</option></select>
                </div>
                <button class="btn btn-primary" id="add-item-btn">Add to Menu</button>
            </div>
            <div id="menu-list"></div>
        </div>

        <div id="tab-insights" class="tab-panel hidden">
            <div class="card">
                <h3>Business Performance</h3>
                <select id="insights-date-picker" style="margin: 20px 0;"></select>

                <div class="stats-grid">
                    <div class="stats-tile">
                        <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">Gross Revenue</div>
                        <div id="stat-rev" style="font-size:1.5rem; color:var(--green); font-weight:bold; margin-top:5px;">£0.00</div>
                    </div>
                    <div class="stats-tile">
                        <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">Pies Sold</div>
                        <div id="stat-qty" style="font-size:1.5rem; color:var(--orange); font-weight:bold; margin-top:5px;">0</div>
                    </div>
                    <div class="stats-tile">
                        <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">Avg Order</div>
                        <div id="stat-avg" style="font-size:1.5rem; color:var(--text); font-weight:bold; margin-top:5px;">£0.00</div>
                    </div>
                </div>

                <table class="insights-table">
                    <thead>
                        <tr>
                            <th>Flavor</th>
                            <th style="text-align:center;">Sold</th>
                            <th style="text-align:right;">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="insights-rows"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, addDoc, deleteDoc, collection, query, where, orderBy, getDocs, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allMenuItems = []; let allCategories = []; let _suppressRender = false;

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            initAdmin();
        } else {
            document.getElementById('login-gate').style.display = 'flex';
            document.getElementById('admin-content').classList.add('hidden');
        }
    });

    document.getElementById('login-btn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value).catch(e => alert(e.message));
    };
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    function initAdmin() {
        onSnapshot(doc(db, "settings", "truck_status"), snap => {
            const d = snap.data() || {};
            window._isClosed = !!d.is_closed;
            document.getElementById('status-text').innerText = d.is_closed ? "CLOSED" : "OPEN";
            document.getElementById('status-text').style.color = d.is_closed ? "var(--red)" : "var(--green)";
        });

        onSnapshot(doc(db, "settings", "collection_dates"), snap => {
            const dates = snap.data()?.dates || [];
            renderDatesAdmin(dates);
            const picker = document.getElementById('insights-date-picker');
            const current = picker.value;
            picker.innerHTML = '<option value="">Select a Batch to Analyze...</option>';
            dates.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.label; opt.innerText = d.label;
                picker.appendChild(opt);
            });
            picker.value = current;
        });

        onSnapshot(doc(db, "settings", "categories"), snap => {
            allCategories = snap.data()?.list || [];
            renderCatTags();
            renderCatDropdown();
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(collection(db, "menu"), snap => {
            allMenuItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allMenuItems.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999));
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(query(collection(db, "orders"), where("status", "==", "pending"), where("paymentStatus", "==", "PAID"), orderBy("createdAt", "desc")), renderOrders);

        document.getElementById('toggle-shop-btn').onclick = () => updateDoc(doc(db, "settings", "truck_status"), { is_closed: !window._isClosed });
        document.getElementById('add-date-btn').onclick = addCollectionDate;
        document.getElementById('add-cat-btn').onclick = addCategory;
        document.getElementById('insights-date-picker').onchange = (e) => runInsights(e.target.value);

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            };
        });
    }

    async function runInsights(dateLabel) {
        if (!dateLabel) return;
        const q = query(collection(db, "orders"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"));
        const snap = await getDocs(q);
        let totalRev = 0; let totalPies = 0; let flavorStats = {}; let orderCount = snap.size;

        snap.forEach(d => {
            const data = d.data();
            data.items.forEach(item => {
                totalRev += item.price;
                totalPies += 1;
                flavorStats[item.name] = (flavorStats[item.name] || 0) + 1;
            });
        });

        document.getElementById('stat-rev').innerText = `£${totalRev.toFixed(2)}`;
        document.getElementById('stat-qty').innerText = totalPies;
        document.getElementById('stat-avg').innerText = orderCount > 0 ? `£${(totalRev / orderCount).toFixed(2)}` : '£0.00';

        const tbody = document.getElementById('insights-rows');
        tbody.innerHTML = "";
        Object.entries(flavorStats).sort((a,b) => b[1] - a[1]).forEach(([name, qty]) => {
            const pieItem = allMenuItems.find(i => i.name === name);
            const price = pieItem ? pieItem.price : 0;
            const row = document.createElement('tr');
            row.innerHTML = `<td>${name}</td><td style="text-align:center; font-weight:bold;">${qty}</td><td style="text-align:right; color:var(--orange);">£${(qty * price).toFixed(2)}</td>`;
            tbody.appendChild(row);
        });
    }

    async function renderDatesAdmin(dates) {
        const wrap = document.getElementById('dates-list-admin'); wrap.innerHTML = "";
        if (!allMenuItems.length) return;
        
        const orderSnap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("paymentStatus", "==", "PAID")));
        const allPreOrders = orderSnap.docs.map(doc => doc.data());
        const sortedPiesFromMenu = allMenuItems.filter(item => item.category === 'PIES');

        dates.forEach(d => {
            const dateOrders = allPreOrders.filter(o => o.collectionDate === d.label && o.status === "pending");
            const pieTotals = {};
            dateOrders.forEach(order => order.items.forEach(item => { pieTotals[item.name] = (pieTotals[item.name] || 0) + 1; }));

            let invHtml = `<div style="margin-top:15px; display:grid; grid-template-columns: 1fr auto auto; gap:10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                            <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">Flavor</div><div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; text-align:center;">Sold</div><div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; text-align:right;">Stock</div>`;
            
            sortedPiesFromMenu.forEach(pieItem => {
                const pieName = pieItem.name;
                const stock = d.inventory[pieName] || 0;
                const soldCount = pieTotals[pieName] || 0;
                invHtml += `<span>${pieName}:</span><span style="color:var(--orange); text-align:center; font-weight:bold;">${soldCount}</span><input type="number" value="${stock}" style="width:50px; padding:2px 5px; font-size:0.8rem; background:#000; border:1px solid #444; color:#fff; text-align:right;" onchange="updatePieStock('${d.id}', '${pieName}', this.value)">`;
            });
            invHtml += `</div>`;

            const div = document.createElement('div'); div.className = 'card'; div.style.background = "var(--surface-2)";
            div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:start;"><div><strong>${d.label}</strong><br><span style='font-size:0.75rem;color:var(--orange)'>${d.times} — ${dateOrders.length} Paid Orders</span></div><div style='display:flex; gap:8px;'><button class='btn' style='background:#34495e; padding: 5px 10px; font-size:0.7rem;' onclick="generatePiePDF('${d.label}')">📄 Orders</button><button class='btn' style='background:#673ab7; padding: 5px 10px; font-size:0.7rem;' onclick="generateTallyPDF('${d.label}')">📊 Tally</button><button class='btn' style='background:${d.active ? 'var(--green)' : '#444'}; font-size:0.7rem; padding: 5px 10px;' onclick="toggleDate('${d.id}')">${d.active ? 'Online' : 'Hidden'}</button><button class='btn btn-cancel' style='padding:5px 10px;' onclick="deleteDate('${d.id}')">✕</button></div></div>${invHtml}`;
            wrap.appendChild(div);
        });
    }

    function renderOrders(snap) {
        const live = document.getElementById('orders-list'); live.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            if (data.type === 'PICKUP') {
                const div = document.createElement('div'); div.className = 'order-card';
                const items = data.items.map(i => `<li>${i.name}</li>`).join('');
                div.innerHTML = `<div style='display:flex;justify-content:space-between'><strong>#${id.slice(-4).toUpperCase()}</strong><span class='btn-primary' style='padding:2px 8px;border-radius:5px;font-size:0.7rem'>${data.type}</span></div><div style='margin:10px 0'><strong>${data.customer?.name || ''}</strong><ul style='list-style:none; font-size:0.8rem; color:var(--muted)'>${items}</ul></div><div style='display:flex;gap:10px'><button class='btn btn-ready'>Ready</button><button class='btn btn-cancel'>Cancel</button></div>`;
                div.querySelector('.btn-ready').onclick = () => updateDoc(doc(db, "orders", id), { status: 'ready' });
                div.querySelector('.btn-cancel').onclick = () => confirm('Cancel?') && updateDoc(doc(db, "orders", id), { status: 'cancelled' });
                live.appendChild(div);
            }
        });
    }

    function renderMenuList() {
        if (_suppressRender) return;
        const list = document.getElementById('menu-list'); list.innerHTML = "";
        allCategories.forEach(cat => {
            const items = allMenuItems.filter(i => i.category === cat);
            const sec = document.createElement('div'); sec.innerHTML = `<div style='color:var(--orange); font-size:0.7rem; margin: 20px 0 10px; text-transform:uppercase;'>${cat}</div>`;
            const container = document.createElement('div'); container.className = 'card'; container.style.padding = "0";
            items.forEach(item => container.appendChild(makeRow(item)));
            list.appendChild(sec); sec.appendChild(container);
            initDragEvents(container, '.inv-row', saveItemOrder);
        });
    }

    function makeRow(item) {
        const row = document.createElement('div'); row.className = 'inv-row'; row.draggable = true; row.dataset.id = item.id;
        const hasV = item.variants && item.variants.length > 0;
        row.innerHTML = `<span class='drag-handle'>⠿</span><input type='text' class='inv-name-input' value="${item.name}"><div style="display:flex; align-items:center; gap:4px;"><span style="color:var(--orange); font-size:0.8rem;">£</span><input type='number' class='inv-price-input' value="${parseFloat(item.price || 0).toFixed(2)}" step="0.01" ${hasV ? 'disabled style="opacity:0.4"' : ''} onfocus="_suppressRender=true" onblur="_suppressRender=false; updateItemPrice('${item.id}', this.value)"></div><input type='checkbox' ${item.is_available ? 'checked' : ''} style='width:auto;' onchange="updateDoc(doc(db,'menu','${item.id}'),{is_available:this.checked})"><button class='opts-btn'>⚙ Options</button><button style='background:none; border:none; color:var(--red); cursor:pointer;' onclick="confirm('Delete?') && deleteDoc(doc(db,'menu','${item.id}'))">✕</button>`;
        const [nameInp, priceInp, availInp] = row.querySelectorAll('input');
        nameInp.onfocus = () => _suppressRender = true;
        nameInp.onblur = async () => { _suppressRender = false; if(nameInp.value.trim() !== item.name) await updateDoc(doc(db, "menu", item.id), { name: nameInp.value.trim() }); };
        row.querySelector('.opts-btn').onclick = () => toggleOptsEditor(item, row);
        return row;
    }

    window.updateItemPrice = async (id, val) => { const p = parseFloat(val); if(!isNaN(p)) await updateDoc(doc(db, "menu", id), { price: p }); };

    function renderCatTags() {
        const wrap = document.getElementById('cat-tags-list'); wrap.innerHTML = "";
        allCategories.forEach(cat => {
            const tag = document.createElement('div'); tag.className = 'cat-tag'; tag.draggable = true; tag.innerText = cat + ' ';
            const del = document.createElement('button'); del.style.cssText = 'background:none;border:none;color:var(--muted);cursor:pointer;';
            del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); const newList = allCategories.filter(c => c !== cat); setDoc(doc(db, "settings", "categories"), { list: newList }); };
            tag.appendChild(del); wrap.appendChild(tag);
        });
        initDragEvents(wrap, '.cat-tag', async (container) => { const newList = [...container.querySelectorAll('.cat-tag')].map(t => t.innerText.replace(' ×', '').trim()); await setDoc(doc(db, "settings", "categories"), { list: newList }); });
    }

    function renderCatDropdown() { const sel = document.getElementById('new-cat'); if(!sel) return; sel.innerHTML = '<option value="">Select category…</option>'; allCategories.forEach(c => { const o = document.createElement('option'); o.value = c; o.innerText = c; sel.appendChild(o); }); }

    function toggleOptsEditor(item, row) {
        const next = row.nextElementSibling; if (next && next.classList.contains('opts-editor')) { next.remove(); return; }
        const editor = document.createElement('div'); editor.className = 'opts-editor'; editor.style.padding = "20px";
        const refresh = async () => {
            const snap = await getDoc(doc(db, "menu", item.id)); const d = snap.data();
            editor.innerHTML = `<h5>Free Options</h5><div>${(d.subOptions||[]).map(o => `<span class='opts-tag'>${o}<button onclick="updateSubOpt('${item.id}','${o}')">×</button></span>`).join('')}</div><div class='opts-add-row'><input type='text' class='f-in'><button class='btn btn-primary f-add'>+ Add</button></div><br><h5>Variants</h5><div>${(d.variants||[]).map(v => `<span class='opts-tag'>${v.label} £${v.price}<button onclick="updateVariant('${item.id}','${v.label}')">×</button></span>`).join('')}</div><div class='opts-add-row'><input type='text' class='v-l'><input type='number' class='v-p' placeholder='£'><button class='btn btn-primary v-add'>+ Add</button></div>`;
            editor.querySelector('.f-add').onclick = async () => { const val = editor.querySelector('.f-in').value.trim(); if(!val) return; await updateDoc(doc(db, "menu", item.id), { subOptions: [...(d.subOptions||[]), val] }); refresh(); };
            editor.querySelector('.v-add').onclick = async () => { const l = editor.querySelector('.v-l').value.trim(); const p = parseFloat(editor.querySelector('.v-p').value); if(!l || isNaN(p)) return; await updateDoc(doc(db, "menu", item.id), { variants: [...(d.variants||[]), {label:l, price:p}] }); refresh(); };
        };
        window.updateSubOpt = async (id, opt) => { const snap = await getDoc(doc(db, "menu", id)); await updateDoc(doc(db, "menu", id), { subOptions: snap.data().subOptions.filter(o=>o!==opt) }); refresh(); };
        window.updateVariant = async (id, lab) => { const snap = await getDoc(doc(db, "menu", id)); await updateDoc(doc(db, "menu", id), { variants: snap.data().variants.filter(v=>v.label!==lab) }); refresh(); };
        row.insertAdjacentElement('afterend', editor); refresh();
    }

    function initDragEvents(container, selector, onDropCallback) {
        let draggedItem = null;
        container.addEventListener('dragstart', (e) => { draggedItem = e.target.closest(selector); if (draggedItem) { draggedItem.classList.add('dragging'); _suppressRender = true; } });
        container.addEventListener('dragend', (e) => { if (draggedItem) { draggedItem.classList.remove('dragging'); _suppressRender = false; onDropCallback(container); } });
        container.addEventListener('dragover', (e) => { e.preventDefault(); const after = getDragAfterElement(container, e.clientY, selector); if (after == null) container.appendChild(draggedItem); else container.insertBefore(draggedItem, after); });
    }

    function getDragAfterElement(container, y, selector) {
        const draggables = [...container.querySelectorAll(`${selector}:not(.dragging)`)];
        return draggables.reduce((closest, child) => {
            const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    async function saveItemOrder(container) {
        const rows = [...container.querySelectorAll('.inv-row')]; const b = writeBatch(db);
        rows.forEach((r, i) => b.update(doc(db, "menu", r.dataset.id), { sortOrder: i })); await b.commit();
    }

    window.updatePieStock = async (id, pie, val) => {
        const num = parseInt(val); if (isNaN(num)) return;
        const s = await getDoc(doc(db, "settings", "collection_dates"));
        const dts = s.data().dates.map(d => { if (d.id === id) { d.inventory[pie] = num; return d; } return d; });
        await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts });
    };

    window.toggleDate = async (id) => { const s = await getDoc(doc(db, "settings", "collection_dates")); const dts = s.data().dates.map(d => d.id === id ? {...d, active: !d.active} : d); await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts }); };
    window.deleteDate = async (id) => { if(!confirm("Delete?")) return; const s = await getDoc(doc(db, "settings", "collection_dates")); const dts = s.data().dates.filter(d => d.id !== id); await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts }); };

    window.generatePiePDF = async (dateLabel) => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"), where("status","==","pending")));
        const rows = snap.docs.map(d => [d.data().customer?.name || '', d.data().items.map(i => i.name).join(', '), d.data().customer?.msg || '-']);
        pdf.text("Order Sheet: " + dateLabel, 14, 15); pdf.autoTable({ head: [['Customer', 'Items', 'Notes']], body: rows });
        pdf.save(`Orders_${dateLabel}.pdf`);
    }

    window.generateTallyPDF = async (dateLabel) => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"), where("status", "==", "pending")));
        const totals = {}; let grandTotal = 0;
        snap.forEach(d => { d.data().items.forEach(item => { totals[item.name] = (totals[item.name] || 0) + 1; grandTotal++; }); });
        const rows = Object.entries(totals).map(([name, qty]) => [name, qty]);
        rows.push([{ content: 'TOTAL PIES', styles: { fontStyle: 'bold', fillColor: [244, 113, 43], textColor: [255,255,255] } }, { content: grandTotal, styles: { fontStyle: 'bold', fillColor: [244, 113, 43], textColor: [255,255,255] } }]);
        pdf.text("Tally: " + dateLabel, 14, 15); pdf.autoTable({ head: [['Variety', 'Qty']], body: rows });
        pdf.save(`Tally_${dateLabel}.pdf`);
    }

    async function addItem() { const name = document.getElementById('new-name').value.trim(); const price = parseFloat(document.getElementById('new-price').value); const category = document.getElementById('new-cat').value; if (!name || isNaN(price) || !category) return; await addDoc(collection(db, "menu"), { name, price, category, is_available: true, sortOrder: 999, subOptions: [], variants: [] }); document.getElementById('new-name').value=""; document.getElementById('new-price').value=""; }
    function addCategory() { const name = document.getElementById('new-cat-name').value.toUpperCase().trim(); if (!name || allCategories.includes(name)) return; setDoc(doc(db, "settings", "categories"), { list: [...allCategories, name] }); document.getElementById('new-cat-name').value=""; }
    async function addCollectionDate() { const dateStr = document.getElementById('new-pie-date').value.trim(); if(!dateStr) return; const pieItems = allMenuItems.filter(i => i.category === 'PIES'); const inv = {}; pieItems.forEach(p => inv[p.name] = 0); const s = await getDoc(doc(db, "settings", "collection_dates")); const updated = [...(s.data()?.dates || []), { id: Date.now().toString(), label: dateStr, times: document.getElementById('new-pie-times').value, inventory: inv, active: true }]; await setDoc(doc(db, "settings", "collection_dates"), { dates: updated }); document.getElementById('new-pie-date').value = ""; document.getElementById('new-pie-times').value = ""; }
</script>
