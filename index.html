<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --surface-2: #1F1F1F; --text: #F0EDE8; --muted: #888; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .app-header { background: var(--surface); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand-name { font-family: 'Playfair Display'; font-size: 1.4rem; font-weight: 900; }
        .brand-name span { color: var(--orange); }
        .tab-nav { display: flex; margin: 20px 32px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 14px 22px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .content-area { padding: 0 32px; max-width: 900px; }
        .card { background: var(--surface); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .order-card { background: var(--surface-2); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-cancel { background: var(--red); color: white; }
        .btn-pdf { background: #34495e; color: white; width: 100%; margin-bottom: 15px; }
        input, select { background: var(--surface-2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; font-family: 'DM Sans', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--orange); }
        .hidden { display: none !important; }
        #login-gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .menu-item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); background: var(--surface-2); border-radius: 8px; margin-bottom: 6px; }
        .item-move-btns { display: flex; flex-direction: column; gap: 2px; margin-right: 12px; }
        .move-btn { background: rgba(255,255,255,0.07); border: none; color: var(--muted); width: 24px; height: 20px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        .move-btn:hover:not(:disabled) { background: var(--orange); color: white; }
        .move-btn:disabled { opacity: 0.2; cursor: default; }
        .cat-section { margin-bottom: 24px; }
        .cat-section-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); margin-bottom: 10px; padding: 0 4px; }
        .order-actions { display: flex; gap: 8px; margin-top: 12px; }
        .customer-info { background: rgba(255,255,255,0.04); padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 0.9rem; }
        .order-items { list-style: none; margin: 8px 0; font-size: 0.9rem; color: var(--muted); }
        .order-items li::before { content: "· "; color: var(--orange); }
        .cat-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; margin: 4px; }
        .cat-tag-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div style="width:320px; text-align:center;">
            <h1 class="brand-name" style="margin-bottom:24px;">Chips<span>&</span> Admin</h1>
            <input type="email" id="admin-email" placeholder="Email" style="width:100%">
            <input type="password" id="admin-pass" placeholder="Password" style="width:100%">
            <button class="btn btn-primary" onclick="handleLogin()" style="width:100%; padding:14px;">Sign In</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <header class="app-header">
            <div class="brand-name">Chips<span>&</span> Admin</div>
            <button class="btn" style="background:#333; color:white;" onclick="handleLogout()">Logout</button>
        </header>

        <div class="card" style="margin: 20px 32px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>Shop Status: <strong id="status-text">...</strong></div>
                <button class="btn btn-primary" onclick="toggleShop()">Toggle Status</button>
            </div>
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" onclick="showTab('live', this)">Live Orders</button>
            <button class="tab-btn" onclick="showTab('pies', this)">Pie Batch</button>
            <button class="tab-btn" onclick="showTab('menu', this)">Inventory</button>
        </nav>

        <div class="content-area">
            <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

            <div id="tab-pies" class="tab-panel hidden">
                <div class="card" style="border-color:var(--orange)">
                    <h3 style="margin-bottom:15px">Pie Batch Control</h3>
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px; flex-wrap:wrap;">
                        <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="pie-toggle"> Enable Pie Orders</label>
                        <input type="number" id="pie-stock" placeholder="Stock qty" style="width:100px; margin:0">
                        <button class="btn btn-primary" onclick="updatePieSettings()">Update</button>
                    </div>
                    <button class="btn btn-pdf" onclick="generatePiePDF()">Download PDF Prep Sheet</button>
                    <button class="btn" style="width:100%; background:#444; color:white;" onclick="archivePies()">Archive Current Pie Batch</button>
                </div>
                <div id="pie-list"></div>
            </div>

            <div id="tab-menu" class="tab-panel hidden">
                <div class="card" style="margin-bottom:16px;">
                    <h3 style="margin-bottom:14px;">Manage Categories</h3>
                    <div id="cat-tags-list" style="margin-bottom:12px;"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="new-cat-name" placeholder="New category name" style="flex:1; margin:0;">
                        <button class="btn btn-primary" onclick="addCategory()">Add Category</button>
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom:14px;">Add Menu Item</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                        <input type="text" id="new-name" placeholder="Item name">
                        <input type="number" id="new-price" placeholder="Price (£)" step="0.01">
                        <select id="new-cat"><option value="">Select category...</option></select>
                    </div>
                    <button class="btn btn-primary" onclick="addItem()">Add to Menu</button>
                </div>
                <div id="menu-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, where, orderBy, getDocs, writeBatch, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allMenuItems = [];
        let allCategories = [];

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value).catch(e => alert(e.message));
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('login-gate').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        });

        function initAdmin() {
            // Shop status
            onSnapshot(doc(db, "settings", "truck_status"), s => {
                const data = s.data();
                window.masterClosed = data?.is_closed;
                document.getElementById('status-text').innerText = data?.is_closed ? "CLOSED" : "OPEN";
                document.getElementById('pie-toggle').checked = data?.pies_enabled || false;
                document.getElementById('pie-stock').value = data?.pie_inventory || 0;
            });

            // Categories
            onSnapshot(doc(db, "settings", "categories"), snap => {
                const savedCats = snap.data()?.list || [];
                const fromItems = [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
                const merged = [...new Set([...savedCats, ...fromItems])];
                allCategories = merged.length > 0 ? merged : ["CHIPS", "PIES", "SIDES"];
                if (allCategories.some(c => !savedCats.includes(c))) {
                    setDoc(doc(db, "settings", "categories"), { list: allCategories }).catch(() => {});
                }
                renderCategoryTags();
                renderCategoryDropdown();
                renderMenuList();
            });

            // Orders
            onSnapshot(query(collection(db, "orders"), where("status", "==", "pending"), orderBy("createdAt", "desc")), snap => {
                const live = document.getElementById('orders-list');
                const pie = document.getElementById('pie-list');
                live.innerHTML = "";
                pie.innerHTML = "";
                if (snap.empty) live.innerHTML = '<p style="color:var(--muted); padding:20px 0;">No pending orders.</p>';
                snap.forEach(d => {
                    const data = d.data();
                    const shortId = d.id.slice(-4).toUpperCase();
                    const div = document.createElement('div');
                    div.className = 'order-card';

                    let html = '<div style="display:flex;justify-content:space-between;align-items:center;">';
                    html += '<strong>#' + shortId + '</strong>';
                    html += '<span style="font-size:0.75rem;background:rgba(244,113,43,0.15);color:var(--orange);padding:4px 10px;border-radius:20px;">' + data.type + '</span></div>';
                    if (data.customer) {
                        html += '<div class="customer-info"><strong>' + (data.customer.name || '-') + '</strong>';
                        if (data.customer.phone) html += ' &middot; ' + data.customer.phone;
                        if (data.customer.msg) html += '<br><span style="color:var(--muted)">Note: ' + data.customer.msg + '</span>';
                        html += '</div>';
                    }
                    html += '<ul class="order-items">' + data.items.map(i => '<li>' + i.name + ' &mdash; &pound;' + i.price.toFixed(2) + '</li>').join('') + '</ul>';
                    html += '<div class="order-actions">';
                    if (data.type === 'PICKUP') html += '<button class="btn btn-ready" onclick="updateStatus(\'' + d.id + '\',\'ready\')">Mark Ready</button>';
                    html += '<button class="btn btn-cancel" onclick="cancelOrder(\'' + d.id + '\')">Cancel Order</button></div>';

                    div.innerHTML = html;
                    data.type === 'PRE-ORDER' ? pie.appendChild(div) : live.appendChild(div);
                });
            });

            // Menu items
            onSnapshot(collection(db, "menu"), snap => {
                allMenuItems = [];
                snap.forEach(d => allMenuItems.push({ id: d.id, ...d.data() }));
                allMenuItems.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999));

                const fromItems = [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
                const newCats = fromItems.filter(c => !allCategories.includes(c));
                if (newCats.length > 0) {
                    allCategories = [...allCategories, ...newCats];
                    setDoc(doc(db, "settings", "categories"), { list: allCategories }).catch(() => {});
                    renderCategoryTags();
                    renderCategoryDropdown();
                }
                renderMenuList();
            });
        }

        // ── CATEGORIES ───────────────────────────────────────

        function renderCategoryTags() {
            const container = document.getElementById('cat-tags-list');
            if (!container) return;
            container.innerHTML = "";
            allCategories.forEach(cat => {
                const tag = document.createElement('span');
                tag.className = 'cat-tag';
                tag.appendChild(document.createTextNode(cat + ' '));
                const del = document.createElement('button');
                del.className = 'cat-tag-del';
                del.innerText = '×';
                del.addEventListener('click', () => deleteCategory(cat));
                tag.appendChild(del);
                container.appendChild(tag);
            });
        }

        function renderCategoryDropdown() {
            const sel = document.getElementById('new-cat');
            if (!sel) return;
            const current = sel.value;
            sel.innerHTML = '<option value="">Select category...</option>';
            allCategories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                if (cat === current) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        window.addCategory = async () => {
            const input = document.getElementById('new-cat-name');
            const name = input.value.trim().toUpperCase();
            if (!name) return alert("Enter a category name");
            if (allCategories.includes(name)) return alert("Category already exists");
            await setDoc(doc(db, "settings", "categories"), { list: [...allCategories, name] });
            input.value = "";
        };

        window.deleteCategory = async (cat) => {
            const inCat = allMenuItems.filter(i => i.category === cat);
            const msg = inCat.length > 0
                ? '"' + cat + '" has ' + inCat.length + ' item(s). Delete category and all its items?'
                : 'Delete category "' + cat + '"?';
            if (!confirm(msg)) return;
            if (inCat.length > 0) {
                const batch = writeBatch(db);
                inCat.forEach(item => batch.delete(doc(db, "menu", item.id)));
                await batch.commit();
            }
            await setDoc(doc(db, "settings", "categories"), { list: allCategories.filter(c => c !== cat) });
        };

        // ── INVENTORY RENDER ─────────────────────────────────

        function renderMenuList() {
            const list = document.getElementById('menu-list');
            if (!list) return;
            list.innerHTML = "";

            const byCat = {};
            allCategories.forEach(c => { byCat[c] = []; });
            allMenuItems.forEach(item => {
                const cat = item.category || "CHIPS";
                if (!byCat[cat]) byCat[cat] = [];
                byCat[cat].push(item);
            });

            allCategories.forEach(cat => {
                const items = byCat[cat] || [];

                const sec = document.createElement('div');
                sec.className = 'cat-section';

                const hdr = document.createElement('div');
                hdr.className = 'cat-section-header';
                hdr.innerText = cat + ' (' + items.length + ')';
                sec.appendChild(hdr);

                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '12px';

                if (items.length === 0) {
                    const empty = document.createElement('p');
                    empty.style.cssText = 'color:var(--muted);font-size:0.85rem;padding:8px 4px;';
                    empty.innerText = 'No items in this category.';
                    card.appendChild(empty);
                } else {
                    items.forEach((item, idx) => {
                        const row = document.createElement('div');
                        row.className = 'menu-item-row';

                        // Move buttons
                        const moveBtns = document.createElement('div');
                        moveBtns.className = 'item-move-btns';

                        const upBtn = document.createElement('button');
                        upBtn.className = 'move-btn';
                        upBtn.innerText = '▲';
                        upBtn.title = 'Move up';
                        upBtn.disabled = (idx === 0);
                        upBtn.addEventListener('click', () => moveItem(item.id, cat, -1, items));

                        const downBtn = document.createElement('button');
                        downBtn.className = 'move-btn';
                        downBtn.innerText = '▼';
                        downBtn.title = 'Move down';
                        downBtn.disabled = (idx === items.length - 1);
                        downBtn.addEventListener('click', () => moveItem(item.id, cat, 1, items));

                        moveBtns.appendChild(upBtn);
                        moveBtns.appendChild(downBtn);

                        // Info
                        const nameEl = document.createElement('div');
                        nameEl.innerText = item.name;
                        const metaEl = document.createElement('div');
                        metaEl.style.cssText = 'font-size:0.8rem;color:var(--muted);';
                        metaEl.innerText = '£' + parseFloat(item.price).toFixed(2) + ' · ' + item.category;

                        const info = document.createElement('div');
                        info.appendChild(nameEl);
                        info.appendChild(metaEl);

                        const left = document.createElement('div');
                        left.style.cssText = 'display:flex;align-items:center;flex:1;';
                        left.appendChild(moveBtns);
                        left.appendChild(info);

                        // Availability checkbox — closure captures item.id at this point
                        const itemId = item.id;
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = !!item.is_available;
                        cb.style.cursor = 'pointer';
                        cb.addEventListener('change', function() {
                            updateDoc(doc(db, "menu", itemId), { is_available: this.checked });
                        });

                        const cbLabel = document.createElement('label');
                        cbLabel.style.cssText = 'font-size:0.8rem;display:flex;align-items:center;gap:6px;cursor:pointer;';
                        cbLabel.appendChild(cb);
                        cbLabel.appendChild(document.createTextNode(' Available'));

                        // Remove button
                        const rmBtn = document.createElement('button');
                        rmBtn.innerText = '✕';
                        rmBtn.style.cssText = 'color:var(--red);background:none;border:none;cursor:pointer;font-size:1.1rem;padding:4px 8px;';
                        const itemName = item.name;
                        rmBtn.addEventListener('click', function() {
                            if (confirm('Remove "' + itemName + '"?')) deleteDoc(doc(db, "menu", itemId));
                        });

                        const right = document.createElement('div');
                        right.style.cssText = 'display:flex;gap:8px;align-items:center;';
                        right.appendChild(cbLabel);
                        right.appendChild(rmBtn);

                        row.appendChild(left);
                        row.appendChild(right);
                        card.appendChild(row);
                    });
                }

                sec.appendChild(card);
                list.appendChild(sec);
            });
        }

        // ── ITEM REORDERING ──────────────────────────────────
        // Normalises all items in the category to clean 0-based sortOrders,
        // then swaps the two positions. This handles items with no sortOrder field.

        async function moveItem(itemId, cat, direction, currentItems) {
            const idx = currentItems.findIndex(i => i.id === itemId);
            const swapIdx = idx + direction;
            if (swapIdx < 0 || swapIdx >= currentItems.length) return;

            const batch = writeBatch(db);
            // First normalise all to sequential integers
            currentItems.forEach((item, i) => {
                batch.update(doc(db, "menu", item.id), { sortOrder: i });
            });
            // Then swap the two
            batch.update(doc(db, "menu", currentItems[idx].id), { sortOrder: swapIdx });
            batch.update(doc(db, "menu", currentItems[swapIdx].id), { sortOrder: idx });
            await batch.commit();
        }

        // ── ADD ITEM ─────────────────────────────────────────

        window.addItem = async () => {
            const name = document.getElementById('new-name').value.trim();
            const price = parseFloat(document.getElementById('new-price').value);
            const category = document.getElementById('new-cat').value;
            if (!name || isNaN(price) || !category) return alert("Fill in all fields and select a category");
            const catItems = allMenuItems.filter(i => i.category === category);
            const maxOrder = catItems.length > 0 ? Math.max(...catItems.map(i => i.sortOrder ?? 0)) : -1;
            await addDoc(collection(db, "menu"), { name, price, category, is_available: true, sortOrder: maxOrder + 1 });
            document.getElementById('new-name').value = "";
            document.getElementById('new-price').value = "";
        };

        // ── ORDERS ───────────────────────────────────────────

        window.showTab = (name, btn) => {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).classList.remove('hidden');
            btn.classList.add('active');
        };

        window.toggleShop = async () => await updateDoc(doc(db, "settings", "truck_status"), { is_closed: !window.masterClosed });
        window.updatePieSettings = async () => await updateDoc(doc(db, "settings", "truck_status"), { pies_enabled: document.getElementById('pie-toggle').checked, pie_inventory: parseInt(document.getElementById('pie-stock').value) });
        window.updateStatus = async (id, status) => await updateDoc(doc(db, "orders", id), { status });
        window.cancelOrder = async (id) => {
            if (!confirm("Cancel this order?")) return;
            await updateDoc(doc(db, "orders", id), { status: "cancelled" });
        };

        window.archivePies = async () => {
            if (!confirm("Archive all pie pre-orders?")) return;
            const s = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending")));
            const b = writeBatch(db);
            s.forEach(d => b.update(d.ref, { status: "archived" }));
            await b.commit();
        };

        window.generatePiePDF = async () => {
            const { jsPDF } = window.jspdf;
            const docPDF = new jsPDF();
            const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending")));
            const rows = [];
            snap.forEach(d => {
                const data = d.data();
                rows.push([data.customer?.name || '-', data.customer?.phone || '-', data.items.map(i => i.name).join(", "), data.customer?.msg || '-']);
            });
            docPDF.text("Pie Batch Prep Sheet", 14, 15);
            docPDF.autoTable({ startY: 20, head: [['Customer', 'Phone', 'Items', 'Notes']], body: rows });
            docPDF.save("Pie_Prep.pdf");
        };
    </script>
</body>
</html>
