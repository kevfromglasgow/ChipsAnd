<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --surface-2: #1F1F1F; --text: #F0EDE8; --muted: #888; --green: #2ecc71; --red: #e74c3c; --border: rgba(255,255,255,0.08); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; }
        .app-header { background: var(--surface); padding: 10px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-admin { height: 40px; width: auto; }
        .tab-nav { display: flex; margin: 20px 32px 0; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 14px 22px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .content-area { padding: 24px 32px; max-width: 900px; }
        .card { background: var(--surface); border-radius: 16px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }
        .order-card { background: var(--surface-2); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-cancel { background: var(--red); color: white; }
        .btn-pdf { background: #34495e; color: white; width: 100%; margin-bottom: 12px; }
        input[type=text], input[type=email], input[type=password], input[type=number], select { background: var(--surface-2); border: 1px solid var(--border); color: white; padding: 10px 12px; border-radius: 8px; width: 100%; font-family: 'DM Sans', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--orange); }
        .hidden { display: none !important; }
        #login-gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .status-bar { margin: 20px 32px; background: var(--surface); border-radius: 14px; padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .order-items { list-style: none; margin: 8px 0; font-size: 0.88rem; color: var(--muted); }
        .order-items li::before { content: "· "; color: var(--orange); }
        .cat-tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
        .cat-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: grab; font-size: 0.85rem; user-select: none; }
        .cat-tag.drag-over { border-color: var(--orange); }
        .inv-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: grab; gap: 8px; }
        .inv-row:last-child { border-bottom: none; }
        .drag-handle { color: var(--muted); margin-right: 4px; flex-shrink: 0; }
        .inv-name { flex: 1; }
        .inv-name-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 2px 4px; outline: none; width: 100%; }
        .inv-name-input:focus { border-bottom-color: var(--orange); }
        .inv-price { color: var(--orange); margin-right: 8px; white-space: nowrap; flex-shrink: 0; }
        .opts-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
        .opts-btn:hover { border-color: var(--orange); color: var(--orange); }
        .opts-editor { padding: 12px 16px; background: rgba(0,0,0,0.25); border-bottom: 1px solid var(--border); }
        .opts-editor h5 { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .opts-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); border: 1px solid var(--border); padding: 3px 8px 3px 10px; border-radius: 14px; font-size: 0.8rem; margin: 2px; }
        .opts-tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; }
        .opts-tag button:hover { color: var(--red); }
        .opts-add-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .opts-add-row input { flex: 1; min-width: 120px; padding: 7px 10px; font-size: 0.82rem; }
        .opts-add-row input[type=number] { width: 90px; flex: none; }
        .opts-add-row .btn { font-size: 0.82rem; padding: 6px 12px; white-space: nowrap; }
    </style>
</head>
<body>

<div id="login-gate">
    <div style="width:320px;text-align:center;">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="width:220px; margin-bottom:30px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn btn-primary" id="login-btn" style="padding:14px;">Sign In</button>
        </div>
    </div>
</div>

<div id="admin-content" class="hidden">
    <header class="app-header">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-admin">
        <button class="btn" style="background:#2a2a2a;color:white;" id="logout-btn">Logout</button>
    </header>

    <div class="status-bar">
        <div>Shop Status: <strong id="status-text">...</strong></div>
        <button class="btn btn-primary" id="toggle-shop-btn">Toggle Shop Status</button>
    </div>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">Live Orders</button>
        <button class="tab-btn" data-tab="pies">Pie Batch</button>
        <button class="tab-btn" data-tab="menu">Inventory</button>
    </nav>

    <div class="content-area">
        <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

        <div id="tab-pies" class="tab-panel hidden">
            <div class="card" style="border-color:var(--orange)">
                <h3 style="margin-bottom:16px">Collection Dates Manager</h3>
                <div style="display:grid; grid-template-columns: 1fr 100px auto; gap:10px; margin-bottom:12px;">
                    <input type="text" id="new-pie-date" placeholder="e.g. Friday 17th April">
                    <input type="text" id="new-pie-times" placeholder="9am - 5pm">
                    <button class="btn btn-primary" id="add-date-btn">Add Date</button>
                </div>
                <div id="dates-list-admin"></div>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <button class="btn btn-pdf" id="pie-pdf-btn">Download PDF Prep Sheet</button>
                <button class="btn" style="width:100%;background:#333;color:white;" id="pie-archive-btn">Archive Current Batch</button>
            </div>
            <div id="pie-list"></div>
        </div>

        <div id="tab-menu" class="tab-panel hidden">
            <div class="card">
                <h3>Categories</h3>
                <div class="cat-tags-wrap" id="cat-tags-list"></div>
                <div style="display:flex;gap:10px;">
                    <input type="text" id="new-cat-name" placeholder="New category">
                    <button class="btn btn-primary" id="add-cat-btn">Add</button>
                </div>
            </div>
            <div class="card">
                <h3>Add Item</h3>
                <div style="display:grid;grid-template-columns:1fr 120px 1fr;gap:10px;margin-bottom:12px;">
                    <input type="text" id="new-name" placeholder="Item name">
                    <input type="number" id="new-price" placeholder="Price £" step="0.01">
                    <select id="new-cat"><option value="">Select category…</option></select>
                </div>
                <button class="btn btn-primary" id="add-item-btn">Add to Menu</button>
            </div>
            <div id="menu-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, addDoc, deleteDoc, collection, query, where, orderBy, getDocs, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allMenuItems = []; let allCategories = [];
    let _suppressRender = false; 

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            initAdmin();
        } else {
            document.getElementById('login-gate').style.display = 'flex';
            document.getElementById('admin-content').classList.add('hidden');
        }
    });

    document.getElementById('login-btn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value).catch(e => alert(e.message));
    };
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    function initAdmin() {
        onSnapshot(doc(db, "settings", "truck_status"), snap => {
            const d = snap.data() || {};
            window._isClosed = !!d.is_closed;
            document.getElementById('status-text').innerText = d.is_closed ? "CLOSED" : "OPEN";
        });

        onSnapshot(doc(db, "settings", "collection_dates"), snap => {
            const data = snap.data() || { dates: [] };
            renderDatesAdmin(data.dates);
        });

        onSnapshot(doc(db, "settings", "categories"), snap => {
            const saved = snap.data()?.list || [];
            const fromItems = [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
            allCategories = [...new Set([...saved, ...fromItems])];
            if (!allCategories.length) allCategories = ["CHIPS", "PIES", "SIDES"];
            renderCatTags(); renderCatDropdown();
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(collection(db, "menu"), snap => {
            allMenuItems = [];
            snap.forEach(d => allMenuItems.push({ id: d.id, ...d.data() }));
            allMenuItems.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999));
            
            // Force "heal" check for pies immediately when menu changes
            const dateTab = document.getElementById('tab-pies');
            if (dateTab && !dateTab.classList.contains('hidden')) {
                getDoc(doc(db, "settings", "collection_dates")).then(s => {
                    if(s.exists()) renderDatesAdmin(s.data().dates);
                });
            }

            if (!_suppressRender) renderMenuList();
        });

        const q = query(collection(db, "orders"), where("status", "==", "pending"), where("paymentStatus", "==", "PAID"), orderBy("createdAt", "desc"));
        onSnapshot(q, snap => renderOrders(snap));

        document.getElementById('toggle-shop-btn').onclick = () => updateDoc(doc(db, "settings", "truck_status"), { is_closed: !window._isClosed });
        document.getElementById('add-date-btn').onclick = addCollectionDate;
        document.getElementById('pie-pdf-btn').onclick = handlePdfPrompt;
        document.getElementById('pie-archive-btn').onclick = archivePies;
        document.getElementById('add-cat-btn').onclick = addCategory;
        document.getElementById('add-item-btn').onclick = addItem;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            };
        });
    }

    async function addCollectionDate() {
        const dateStr = document.getElementById('new-pie-date').value.trim();
        const times = document.getElementById('new-pie-times').value.trim() || "9am - 5pm";
        if(!dateStr) return alert("Enter a date");

        const pieItems = allMenuItems.filter(i => i.category === 'PIES');
        const initialInventory = {};
        pieItems.forEach(p => { initialInventory[p.name] = 0; });

        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const cur = snap.data()?.dates || [];
        const updated = [...cur, { 
            id: Date.now().toString(), 
            label: dateStr, 
            times: times, 
            inventory: initialInventory,
            active: true 
        }];

        await setDoc(doc(db, "settings", "collection_dates"), { dates: updated });
        document.getElementById('new-pie-date').value = ""; document.getElementById('new-pie-times').value = "";
    }

    // EXPOSED GLOBAL HELPERS
    window.updatePieStock = async (dateId, pieName, newVal) => {
        const stockNum = parseInt(newVal);
        if (isNaN(stockNum)) return;
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data().dates.map(d => {
            if (d.id === dateId) {
                const newInv = { ...d.inventory };
                newInv[pieName] = stockNum;
                return { ...d, inventory: newInv };
            }
            return d;
        });
        await updateDoc(doc(db, "settings", "collection_dates"), { dates: dates });
    };

    window.toggleDate = async (id) => {
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data().dates.map(d => d.id === id ? {...d, active: !d.active} : d);
        await updateDoc(doc(db, "settings", "collection_dates"), { dates });
    };

    window.deleteDate = async (id) => {
        if(!confirm("Delete this collection date?")) return;
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data().dates.filter(d => d.id !== id);
        await updateDoc(doc(db, "settings", "collection_dates"), { dates });
    };

    function renderDatesAdmin(dates) {
        const wrap = document.getElementById('dates-list-admin'); 
        wrap.innerHTML = "";
        
        if (!allMenuItems.length) return;

        const currentPiesInSystem = allMenuItems
            .filter(i => i.category === 'PIES')
            .map(i => i.name);

        dates.forEach(d => {
            const div = document.createElement('div'); 
            div.className = 'card';
            div.style.cssText = "background:var(--surface-2); margin-bottom:15px; padding:15px;";
            
            // AUTO-HEAL MISSING PIES
            let needsUpdate = false;
            if (!d.inventory) d.inventory = {};

            currentPiesInSystem.forEach(pieName => {
                if (d.inventory[pieName] === undefined) {
                    d.inventory[pieName] = 0;
                    needsUpdate = true;
                }
            });

            if (needsUpdate) {
                const updatedDates = dates.map(dateObj => dateObj.id === d.id ? d : dateObj);
                updateDoc(doc(db, "settings", "collection_dates"), { dates: updatedDates });
                return;
            }

            const sortedInventory = Object.entries(d.inventory || {}).sort((a, b) => a[0].localeCompare(b[0]));

            let invHtml = `<div style="margin-top:10px; display:grid; grid-template-columns: 1fr auto; gap:8px;">`;
            for (const [pieName, stock] of sortedInventory) {
                invHtml += `
                    <span style="font-size:0.85rem; color:var(--muted)">${pieName}:</span>
                    <input type="number" value="${stock}" 
                        style="width:60px; padding:2px 5px; font-size:0.8rem; background:#000; border:1px solid #444; color:#fff;" 
                        onchange="updatePieStock('${d.id}', '${pieName}', this.value)">
                `;
            }
            invHtml += `</div>`;

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div><strong>${d.label}</strong> <span style='font-size:0.75rem;color:var(--orange)'>(${d.times})</span></div>
                    <div style='display:flex; gap:10px;'>
                        <button class='btn' style='background:${d.active ? 'var(--green)' : '#444'}; font-size:0.7rem;' onclick="toggleDate('${d.id}')">${d.active ? 'Online' : 'Hidden'}</button>
                        <button class='btn btn-cancel' style='padding:5px 10px;' onclick="deleteDate('${d.id}')">✕</button>
                    </div>
                </div>
                ${invHtml}
            `;
            wrap.appendChild(div);
        });
    }

    async function handlePdfPrompt() {
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data()?.dates || [];
        if(!dates.length) return alert("No dates found");
        const choice = prompt("Enter the exact Date Label for the PDF:\n\n" + dates.map(d => d.label).join("\n"));
        if(choice) generatePiePDF(choice);
    }

    function renderOrders(snap) {
        const live = document.getElementById('orders-list'); const pie = document.getElementById('pie-list');
        live.innerHTML = ""; pie.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            const div = document.createElement('div'); div.className = 'order-card';
            const itemLines = data.items.map(i => `<li>${i.name} ${i.variantLabel ? '('+i.variantLabel+')' : (i.subOption ? '('+i.subOption+')' : '')}</li>`).join('');
            div.innerHTML = `<div style='display:flex;justify-content:space-between'><strong>#${id.slice(-4).toUpperCase()}</strong><span class='btn-primary' style='padding:2px 8px;border-radius:5px;font-size:0.7rem'>${data.type}</span></div>
                <div style='margin:10px 0'><strong>${data.customer?.name || ''}</strong> ${data.collectionDate ? `<br><span style="color:var(--orange);font-size:0.8rem">${data.collectionDate}</span>` : ''}<ul class='order-items'>${itemLines}</ul></div>
                <div style='display:flex;gap:10px'><button class='btn btn-ready'>Ready</button><button class='btn btn-cancel'>Cancel</button></div>`;
            div.querySelector('.btn-ready').onclick = () => updateDoc(doc(db, "orders", id), { status: 'ready' });
            div.querySelector('.btn-cancel').onclick = () => confirm('Cancel order?') && updateDoc(doc(db, "orders", id), { status: 'cancelled' });
            data.type === 'PRE-ORDER' ? pie.appendChild(div) : live.appendChild(div);
        });
    }

    function renderCatTags() {
        const wrap = document.getElementById('cat-tags-list'); wrap.innerHTML = "";
        allCategories.forEach((cat, idx) => {
            const tag = document.createElement('div'); tag.className = 'cat-tag'; tag.draggable = true;
            tag.dataset.idx = idx; tag.appendChild(document.createTextNode(cat + ' '));
            const delBtn = document.createElement('button'); delBtn.style.cssText = 'background:none;border:none;color:var(--muted);cursor:pointer;';
            delBtn.innerText = '×'; delBtn.onclick = (e) => { e.stopPropagation(); deleteCategory(cat); };
            tag.appendChild(delBtn); wrap.appendChild(tag);
            tag.ondragstart = (e) => e.dataTransfer.setData('idx', String(idx));
            tag.ondragover = (e) => { e.preventDefault(); tag.classList.add('drag-over'); };
            tag.ondragleave = () => tag.classList.remove('drag-over');
            tag.ondrop = (e) => {
                e.preventDefault(); tag.classList.remove('drag-over');
                const fromIdx = parseInt(e.dataTransfer.getData('idx'));
                const toIdx = parseInt(tag.dataset.idx);
                if (fromIdx === toIdx) return;
                const list = [...allCategories]; const [moved] = list.splice(fromIdx, 1);
                list.splice(toIdx, 0, moved); allCategories = list;
                setDoc(doc(db, "settings", "categories"), { list: allCategories });
            };
        });
    }

    function renderCatDropdown() {
        const sel = document.getElementById('new-cat');
        sel.innerHTML = '<option value="">Select category…</option>';
        allCategories.forEach(c => { const o = document.createElement('option'); o.value = c; o.innerText = c; sel.appendChild(o); });
    }

    function renderMenuList() {
        if (_suppressRender) return;
        const list = document.getElementById('menu-list'); list.innerHTML = "";
        allCategories.forEach(cat => {
            const items = allMenuItems.filter(i => i.category === cat);
            const sec = document.createElement('div'); sec.style.marginBottom = "20px";
            sec.innerHTML = `<div style='color:var(--orange);font-size:0.7rem;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;'>${cat}</div>`;
            const container = document.createElement('div'); container.className = 'card'; container.style.padding = "0";
            items.forEach(item => { container.appendChild(makeRow(item, items, container)); });
            sec.appendChild(container); list.appendChild(sec);
        });
    }

    function makeRow(item, siblings, container) {
        const row = document.createElement('div'); row.className = 'inv-row'; row.draggable = true; row.dataset.id = item.id;
        const handle = document.createElement('span'); handle.className = 'drag-handle'; handle.innerText = '⠿';
        const nameInput = document.createElement('input'); nameInput.type = 'text'; nameInput.className = 'inv-name-input'; nameInput.value = item.name;
        nameInput.addEventListener('focus', () => { _suppressRender = true; });
        nameInput.addEventListener('blur', async () => {
            const newName = nameInput.value.trim();
            if (newName && newName !== item.name) await updateDoc(doc(db, "menu", item.id), { name: newName });
            _suppressRender = false;
        });
        const priceEl = document.createElement('span'); priceEl.className = 'inv-price';
        priceEl.innerText = (item.variants && item.variants.length) ? 'variants' : '£' + parseFloat(item.price).toFixed(2);
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!item.is_available; cb.style.cssText = 'width:auto;accent-color:var(--orange);cursor:pointer;';
        cb.addEventListener('change', async () => { _suppressRender = true; await updateDoc(doc(db, "menu", item.id), { is_available: cb.checked }); _suppressRender = false; });
        const optsBtn = document.createElement('button'); optsBtn.className = 'opts-btn'; optsBtn.innerText = '⚙ Options';
        optsBtn.onclick = () => toggleOptsEditor(item, row);
        const delBtn = document.createElement('button'); delBtn.style.cssText = 'background:none;border:none;color:var(--muted);margin-left:6px;cursor:pointer;';
        delBtn.innerText = '✕'; delBtn.onclick = () => confirm("Delete item?") && deleteDoc(doc(db, "menu", item.id));
        row.appendChild(handle); row.appendChild(nameInput); row.appendChild(priceEl); row.appendChild(cb); row.appendChild(optsBtn); row.appendChild(delBtn);
        return row;
    }

    function toggleOptsEditor(item, row) {
        const next = row.nextElementSibling;
        if (next && next.classList.contains('opts-editor')) { next.remove(); return; }
        const editor = document.createElement('div'); editor.className = 'opts-editor';
        const refresh = async () => {
            const snap = await getDoc(doc(db, "menu", item.id));
            const d = snap.data();
            editor.innerHTML = `<h5>Free Options</h5><div class='f-wrap'>${(d.subOptions||[]).map(o => `<span class='opts-tag'>${o}<button onclick="updateSubOpt('${item.id}','${o}')">×</button></span>`).join('')}</div>
                <div class='opts-add-row'><input type='text' class='f-in'><button class='btn btn-primary f-add'>+ Add</button></div><br>
                <h5>Variants</h5><div class='v-wrap'>${(d.variants||[]).map(v => `<span class='opts-tag'>${v.label} £${v.price}<button onclick="updateVariant('${item.id}','${v.label}')">×</button></span>`).join('')}</div>
                <div class='opts-add-row'><input type='text' class='v-l'><input type='number' class='v-p' placeholder='£'><button class='btn btn-primary v-add'>+ Add</button></div>`;
            editor.querySelector('.f-add').onclick = async () => {
                const val = editor.querySelector('.f-in').value.trim();
                const fresh = await getDoc(doc(db, "menu", item.id));
                await updateDoc(doc(db, "menu", item.id), { subOptions: [...(fresh.data().subOptions||[]), val] }); refresh();
            };
        };
        window.updateSubOpt = async (id, opt) => { const fresh = await getDoc(doc(db, id)); await updateDoc(doc(db, id), { subOptions: fresh.data().subOptions.filter(o=>o!==opt) }); refresh(); };
        row.insertAdjacentElement('afterend', editor); refresh();
    }

    async function addItem() {
        const name = document.getElementById('new-name').value.trim();
        const price = parseFloat(document.getElementById('new-price').value);
        const category = document.getElementById('new-cat').value;
        if (!name || isNaN(price) || !category) return;
        await addDoc(collection(db, "menu"), { name, price, category, is_available: true, sortOrder: 999, subOptions: [], variants: [] });
        document.getElementById('new-name').value = ""; document.getElementById('new-price').value = "";
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value.toUpperCase().trim();
        if (!name || allCategories.includes(name)) return;
        setDoc(doc(db, "settings", "categories"), { list: [...allCategories, name] });
    }

    async function archivePies() {
        if (!confirm("Archive?")) return;
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending")));
        const b = writeBatch(db); snap.forEach(d => b.update(d.ref, { status: "archived" })); await b.commit();
    }

    async function generatePiePDF(dateLabel) {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID")));
        const rows = []; snap.forEach(d => { const data = d.data(); rows.push([data.customer?.name || '', data.items.map(i => i.name + (i.variantLabel ? ' (' + i.variantLabel + ')' : '')).join(', '), data.customer?.msg || '-']); });
        pdf.text("Pie Prep Sheet: " + dateLabel, 14, 15); pdf.autoTable({ startY: 20, head: [['Customer', 'Items', 'Note']], body: rows });
        pdf.save(`Pies_${dateLabel.replace(/ /g, '_')}.pdf`);
    }
</script>
</body>
</html>
