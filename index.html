<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --surface-2: #1F1F1F; --text: #F0EDE8; --muted: #888; --green: #2ecc71; --red: #e74c3c; --border: rgba(255,255,255,0.08); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; }
        .app-header { background: var(--surface); padding: 10px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-admin { height: 40px; width: auto; }
        .tab-nav { display: flex; margin: 20px 32px 0; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 14px 22px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .content-area { padding: 24px 32px; max-width: 900px; }
        .card { background: var(--surface); border-radius: 16px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }
        .order-card { background: var(--surface-2); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-cancel { background: var(--red); color: white; }
        input[type=text], input[type=email], input[type=password], input[type=number], select { background: var(--surface-2); border: 1px solid var(--border); color: white; padding: 10px 12px; border-radius: 8px; width: 100%; font-family: 'DM Sans', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--orange); }
        .hidden { display: none !important; }
        #login-gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .status-bar { margin: 20px 32px; background: var(--surface); border-radius: 14px; padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .order-items { list-style: none; margin: 8px 0; font-size: 0.88rem; color: var(--muted); }
        .cat-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: grab; font-size: 0.85rem; user-select: none; }
        .cat-tag.dragging { opacity: 0.5; border: 1px dashed var(--orange); }
        .inv-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: grab; gap: 12px; transition: background 0.2s; }
        .inv-row.dragging { opacity: 0.4; background: var(--orange); }
        .drag-handle { color: var(--muted); cursor: grab; flex-shrink: 0; }
        .inv-name-input { flex: 2; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 2px 4px; outline: none; }
        .inv-price-input { width: 70px; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--orange); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 2px 4px; outline: none; text-align: right; }
        .opts-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
    </style>
</head>
<body>

<div id="login-gate">
    <div style="width:320px;text-align:center;">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="width:220px; margin-bottom:30px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn btn-primary" id="login-btn" style="padding:14px;">Sign In</button>
        </div>
    </div>
</div>

<div id="admin-content" class="hidden">
    <header class="app-header">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-admin">
        <button class="btn" style="background:#2a2a2a;color:white;" id="logout-btn">Logout</button>
    </header>

    <div class="status-bar">
        <div style="font-size: 1.1rem;">Shop Status: <strong id="status-text">...</strong></div>
        <button class="btn btn-primary" id="toggle-shop-btn">Toggle Shop Status</button>
    </div>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">Live Orders</button>
        <button class="tab-btn" data-tab="pies">Pie Batch</button>
        <button class="tab-btn" data-tab="menu">Inventory</button>
    </nav>

    <div class="content-area">
        <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

        <div id="tab-pies" class="tab-panel hidden">
            <div class="card" style="border-color:var(--orange)">
                <h3 style="margin-bottom:16px">Collection Dates Manager</h3>
                <div style="display:grid; grid-template-columns: 1fr 100px auto; gap:10px; margin-bottom:12px;">
                    <input type="text" id="new-pie-date" placeholder="e.g. Friday 17th April">
                    <input type="text" id="new-pie-times" placeholder="9am - 5pm">
                    <button class="btn btn-primary" id="add-date-btn">Add Date</button>
                </div>
                <div id="dates-list-admin"></div>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <button class="btn" style="width:100%;background:#333;color:white;" id="pie-archive-btn">Archive Current Batch</button>
            </div>
            <div id="pie-list"></div>
        </div>

        <div id="tab-menu" class="tab-panel hidden">
            <div class="card">
                <h3>Categories</h3>
                <div class="cat-tags-wrap" id="cat-tags-list"></div>
                <div style="display:flex;gap:10px;">
                    <input type="text" id="new-cat-name" placeholder="New category">
                    <button class="btn btn-primary" id="add-cat-btn">Add</button>
                </div>
            </div>
            <div class="card">
                <h3>Add Item</h3>
                <div style="display:grid;grid-template-columns:1fr 120px 1fr;gap:10px;margin-bottom:12px;">
                    <input type="text" id="new-name" placeholder="Item name">
                    <input type="number" id="new-price" placeholder="Price £" step="0.01">
                    <select id="new-cat"><option value="">Select category…</option></select>
                </div>
                <button class="btn btn-primary" id="add-item-btn">Add to Menu</button>
            </div>
            <div id="menu-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, addDoc, deleteDoc, collection, query, where, orderBy, getDocs, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allMenuItems = []; let allCategories = [];
    let _suppressRender = false; 

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            initAdmin();
        } else {
            document.getElementById('login-gate').style.display = 'flex';
            document.getElementById('admin-content').classList.add('hidden');
        }
    });

    document.getElementById('login-btn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value).catch(e => alert(e.message));
    };
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    function initAdmin() {
        onSnapshot(doc(db, "settings", "truck_status"), snap => {
            const d = snap.data() || {};
            window._isClosed = !!d.is_closed;
            const statusEl = document.getElementById('status-text');
            statusEl.innerText = d.is_closed ? "CLOSED" : "OPEN";
            statusEl.style.color = d.is_closed ? "var(--red)" : "var(--green)";
        });

        onSnapshot(doc(db, "settings", "collection_dates"), snap => {
            const data = snap.data() || { dates: [] };
            renderDatesAdmin(data.dates);
        });

        onSnapshot(doc(db, "settings", "categories"), snap => {
            allCategories = snap.data()?.list || [];
            renderCatTags(); renderCatDropdown();
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(collection(db, "menu"), snap => {
            allMenuItems = [];
            snap.forEach(d => allMenuItems.push({ id: d.id, ...d.data() }));
            allMenuItems.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999));
            getDoc(doc(db, "settings", "collection_dates")).then(s => { if(s.exists()) renderDatesAdmin(s.data().dates); });
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(query(collection(db, "orders"), where("status", "==", "pending"), where("paymentStatus", "==", "PAID"), orderBy("createdAt", "desc")), renderOrders);

        document.getElementById('toggle-shop-btn').onclick = () => updateDoc(doc(db, "settings", "truck_status"), { is_closed: !window._isClosed });
        document.getElementById('add-date-btn').onclick = addCollectionDate;
        document.getElementById('pie-archive-btn').onclick = archivePies;
        document.getElementById('add-cat-btn').onclick = addCategory;
        document.getElementById('add-item-btn').onclick = addItem;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            };
        });
    }

    async function renderDatesAdmin(dates) {
        const wrap = document.getElementById('dates-list-admin'); 
        wrap.innerHTML = "";
        
        if (!allMenuItems.length) return;

        const orderSnap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("paymentStatus", "==", "PAID")));
        const allPreOrders = orderSnap.docs.map(doc => doc.data());

        const currentPies = allMenuItems.filter(i => i.category === 'PIES').map(i => i.name);
        let needsGlobalUpdate = false;

        dates.forEach(d => {
            let localUpdate = false;
            if (!d.inventory) { d.inventory = {}; localUpdate = true; }
            Object.keys(d.inventory).forEach(p => { if (!currentPies.includes(p)) { delete d.inventory[p]; localUpdate = true; } });
            currentPies.forEach(p => { if (d.inventory[p] === undefined) { d.inventory[p] = 0; localUpdate = true; } });
            if (localUpdate) needsGlobalUpdate = true;

            const dateOrders = allPreOrders.filter(o => o.collectionDate === d.label);
            const totalOrdersCount = dateOrders.length;
            const pieTotals = {};
            dateOrders.forEach(order => order.items.forEach(item => { pieTotals[item.name] = (pieTotals[item.name] || 0) + 1; }));

            const isDateFullySoldOut = Object.values(d.inventory).every(stock => stock === 0);
            const soldOutBadge = isDateFullySoldOut ? `<span style="background:var(--red); color:white; padding:2px 8px; border-radius:4px; font-size:0.7rem; margin-left:10px; vertical-align:middle;">SOLD OUT</span>` : '';

            const sortedInv = Object.entries(d.inventory).sort((a, b) => a[0].localeCompare(b[0]));
            
            let invHtml = `<div style="margin-top:15px; display:grid; grid-template-columns: 1fr auto auto; gap:10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                            <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">Flavor</div>
                            <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; text-align:center;">Sold</div>
                            <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; text-align:right;">Stock</div>`;
            
            for (const [pieName, stock] of sortedInv) {
                const soldCount = pieTotals[pieName] || 0;
                invHtml += `<span style="font-size:0.85rem;">${pieName}:</span><span style="font-size:0.85rem; color:var(--orange); text-align:center; font-weight:bold;">${soldCount}</span><input type="number" value="${stock}" style="width:50px; padding:2px 5px; font-size:0.8rem; background:#000; border:1px solid #444; color:#fff; text-align:right;" onchange="updatePieStock('${d.id}', '${pieName}', this.value)">`;
            }
            invHtml += `</div>`;

            const div = document.createElement('div'); div.className = 'card'; div.style.cssText = "background:var(--surface-2); margin-bottom:15px; padding:15px;";
            div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:start;"><div><div style="display:flex; align-items:center; gap:8px;"><strong>${d.label}</strong>${soldOutBadge}</div><span style='font-size:0.75rem;color:var(--orange)'>${d.times} — ${totalOrdersCount} Total Orders</span></div><div style='display:flex; gap:8px;'><button class='btn' style='background:#34495e; padding: 5px 10px; font-size:0.7rem;' onclick="generatePiePDF('${d.label}')">📄 PDF</button><button class='btn' style='background:${d.active ? 'var(--green)' : '#444'}; font-size:0.7rem; padding: 5px 10px;' onclick="toggleDate('${d.id}')">${d.active ? 'Online' : 'Hidden'}</button><button class='btn btn-cancel' style='padding:5px 10px;' onclick="deleteDate('${d.id}')">✕</button></div></div>${invHtml}`;
            wrap.appendChild(div);
        });
        if (needsGlobalUpdate) updateDoc(doc(db, "settings", "collection_dates"), { dates });
    }

    // DRAG & DROP LOGIC
    function initDragEvents(container, selector, onDropCallback) {
        let draggedItem = null;
        container.addEventListener('dragstart', (e) => { draggedItem = e.target.closest(selector); if (draggedItem) { draggedItem.classList.add('dragging'); _suppressRender = true; } });
        container.addEventListener('dragend', (e) => { if (draggedItem) { draggedItem.classList.remove('dragging'); _suppressRender = false; onDropCallback(container); } });
        container.addEventListener('dragover', (e) => { e.preventDefault(); const afterElement = getDragAfterElement(container, e.clientY, selector); if (afterElement == null) { container.appendChild(draggedItem); } else { container.insertBefore(draggedItem, afterElement); } });
    }

    function getDragAfterElement(container, y, selector) {
        const draggableElements = [...container.querySelectorAll(`${selector}:not(.dragging)`)];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    async function saveItemOrder(container) {
        const rows = [...container.querySelectorAll('.inv-row')]; const batch = writeBatch(db);
        rows.forEach((row, index) => batch.update(doc(db, "menu", row.dataset.id), { sortOrder: index })); await batch.commit();
    }

    // GLOBAL HELPERS
    window.updatePieStock = async (dateId, pieName, newVal) => {
        const stockNum = parseInt(newVal); if (isNaN(stockNum)) return;
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data().dates.map(d => { if (d.id === dateId) { const newInv = { ...d.inventory }; newInv[pieName] = stockNum; return { ...d, inventory: newInv }; } return d; });
        await updateDoc(doc(db, "settings", "collection_dates"), { dates });
    };

    window.toggleDate = async (id) => {
        const snap = await getDoc(doc(db, "settings", "collection_dates"));
        const dates = snap.data().dates.map(d => d.id === id ? {...d, active: !d.active} : d);
        await updateDoc(doc(db, "settings", "collection_dates"), { dates });
    };

    window.deleteDate = async (id) => { if(!confirm("Delete this date?")) return; const snap = await getDoc(doc(db, "settings", "collection_dates")); const dates = snap.data().dates.filter(d => d.id !== id); await updateDoc(doc(db, "settings", "collection_dates"), { dates }); };

    function renderMenuList() {
        if (_suppressRender) return;
        const list = document.getElementById('menu-list'); list.innerHTML = "";
        allCategories.forEach(cat => {
            const items = allMenuItems.filter(i => i.category === cat);
            const sec = document.createElement('div'); sec.style.marginBottom = "20px";
            sec.innerHTML = `<div style='color:var(--orange);font-size:0.7rem;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;'>${cat}</div>`;
            const container = document.createElement('div'); container.className = 'card'; container.style.padding = "0";
            items.forEach(item => container.appendChild(makeRow(item)));
            list.appendChild(sec); sec.appendChild(container);
            initDragEvents(container, '.inv-row', saveItemOrder);
        });
    }

    function makeRow(item) {
        const row = document.createElement('div'); row.className = 'inv-row'; row.draggable = true; row.dataset.id = item.id;
        const hasVariants = item.variants && item.variants.length > 0;
        row.innerHTML = `<span class='drag-handle'>⠿</span><input type='text' class='inv-name-input' value="${item.name}"><div style="display:flex; align-items:center; gap:4px;"><span style="color:var(--orange); font-size:0.8rem;">£</span><input type='number' class='inv-price-input' value="${parseFloat(item.price || 0).toFixed(2)}" step="0.01" ${hasVariants ? 'disabled style="opacity:0.4"' : ''}></div><input type='checkbox' ${item.is_available ? 'checked' : ''} style='width:auto; accent-color:var(--orange);'><button class='opts-btn'>⚙ Options</button><button style='background:none;border:none;color:var(--muted);cursor:pointer;'>✕</button>`;
        const [nameInp, priceInp, availInp] = row.querySelectorAll('input');
        nameInp.onfocus = priceInp.onfocus = () => _suppressRender = true;
        nameInp.onblur = async () => { _suppressRender = false; if(nameInp.value.trim() !== item.name) await updateDoc(doc(db, "menu", item.id), { name: nameInp.value.trim() }); };
        priceInp.onblur = async () => { _suppressRender = false; let p = parseFloat(priceInp.value); if(!isNaN(p) && p !== item.price) await updateDoc(doc(db, "menu", item.id), { price: p }); };
        availInp.onchange = async () => await updateDoc(doc(db, "menu", item.id), { is_available: availInp.checked });
        row.querySelector('.opts-btn').onclick = () => toggleOptsEditor(item, row);
        row.querySelector('button:last-child').onclick = () => confirm("Delete item?") && deleteDoc(doc(db, "menu", item.id));
        return row;
    }

    function renderOrders(snap) {
        const live = document.getElementById('orders-list'); const pie = document.getElementById('pie-list');
        live.innerHTML = ""; pie.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); const id = d.id;
            const div = document.createElement('div'); div.className = 'order-card';
            const itemLines = data.items.map(i => `<li>${i.name} ${i.variantLabel ? '('+i.variantLabel+')' : (i.subOption ? '('+i.subOption+')' : '')}</li>`).join('');
            div.innerHTML = `<div style='display:flex;justify-content:space-between'><strong>#${id.slice(-4).toUpperCase()}</strong><span class='btn-primary' style='padding:2px 8px;border-radius:5px;font-size:0.7rem'>${data.type}</span></div><div style='margin:10px 0'><strong>${data.customer?.name || ''}</strong> ${data.collectionDate ? `<br><span style="color:var(--orange);font-size:0.8rem">${data.collectionDate}</span>` : ''}<ul class='order-items'>${itemLines}</ul></div><div style='display:flex;gap:10px'><button class='btn btn-ready'>Ready</button><button class='btn btn-cancel'>Cancel</button></div>`;
            div.querySelector('.btn-ready').onclick = () => updateDoc(doc(db, "orders", id), { status: 'ready' });
            div.querySelector('.btn-cancel').onclick = () => confirm('Cancel order?') && updateDoc(doc(db, "orders", id), { status: 'cancelled' });
            data.type === 'PRE-ORDER' ? pie.appendChild(div) : live.appendChild(div);
        });
    }

    function renderCatTags() {
        const wrap = document.getElementById('cat-tags-list'); wrap.innerHTML = "";
        allCategories.forEach(cat => {
            const tag = document.createElement('div'); tag.className = 'cat-tag'; tag.draggable = true;
            tag.innerText = cat + ' ';
            const delBtn = document.createElement('button'); delBtn.style.cssText = 'background:none;border:none;color:var(--muted);cursor:pointer;';
            delBtn.innerText = '×'; delBtn.onclick = (e) => { e.stopPropagation(); const newList = allCategories.filter(c => c !== cat); setDoc(doc(db, "settings", "categories"), { list: newList }); };
            tag.appendChild(delBtn); wrap.appendChild(tag);
        });
        initDragEvents(wrap, '.cat-tag', async (container) => { const newList = [...container.querySelectorAll('.cat-tag')].map(t => t.innerText.replace(' ×', '').trim()); await setDoc(doc(db, "settings", "categories"), { list: newList }); });
    }

    function renderCatDropdown() { const sel = document.getElementById('new-cat'); sel.innerHTML = '<option value="">Select category…</option>'; allCategories.forEach(c => { const o = document.createElement('option'); o.value = c; o.innerText = c; sel.appendChild(o); }); }

    function toggleOptsEditor(item, row) {
        const next = row.nextElementSibling; if (next && next.classList.contains('opts-editor')) { next.remove(); return; }
        const editor = document.createElement('div'); editor.className = 'opts-editor';
        const refresh = async () => {
            const snap = await getDoc(doc(db, "menu", item.id)); const d = snap.data();
            editor.innerHTML = `<h5>Free Options</h5><div>${(d.subOptions||[]).map(o => `<span class='opts-tag'>${o}<button onclick="updateSubOpt('${item.id}','${o}')">×</button></span>`).join('')}</div><div class='opts-add-row'><input type='text' class='f-in'><button class='btn btn-primary f-add'>+ Add</button></div><br><h5>Variants</h5><div>${(d.variants||[]).map(v => `<span class='opts-tag'>${v.label} £${v.price}<button onclick="updateVariant('${item.id}','${v.label}')">×</button></span>`).join('')}</div><div class='opts-add-row'><input type='text' class='v-l'><input type='number' class='v-p' placeholder='£'><button class='btn btn-primary v-add'>+ Add</button></div>`;
            editor.querySelector('.f-add').onclick = async () => { const val = editor.querySelector('.f-in').value.trim(); if(!val) return; await updateDoc(doc(db, "menu", item.id), { subOptions: [...(d.subOptions||[]), val] }); refresh(); };
            editor.querySelector('.v-add').onclick = async () => { const l = editor.querySelector('.v-l').value.trim(); const p = parseFloat(editor.querySelector('.v-p').value); if(!l || isNaN(p)) return; await updateDoc(doc(db, "menu", item.id), { variants: [...(d.variants||[]), {label:l, price:p}] }); refresh(); };
        };
        window.updateSubOpt = async (id, opt) => { const snap = await getDoc(doc(db, "menu", id)); await updateDoc(doc(db, "menu", id), { subOptions: snap.data().subOptions.filter(o=>o!==opt) }); refresh(); };
        window.updateVariant = async (id, lab) => { const snap = await getDoc(doc(db, "menu", id)); await updateDoc(doc(db, "menu", id), { variants: snap.data().variants.filter(v=>v.label!==lab) }); refresh(); };
        row.insertAdjacentElement('afterend', editor); refresh();
    }

    async function addItem() { const name = document.getElementById('new-name').value.trim(); const price = parseFloat(document.getElementById('new-price').value); const category = document.getElementById('new-cat').value; if (!name || isNaN(price) || !category) return; await addDoc(collection(db, "menu"), { name, price, category, is_available: true, sortOrder: 999, subOptions: [], variants: [] }); }

    function addCategory() { const name = document.getElementById('new-cat-name').value.toUpperCase().trim(); if (!name || allCategories.includes(name)) return; setDoc(doc(db, "settings", "categories"), { list: [...allCategories, name] }); }

    async function archivePies() { if (!confirm("Archive?")) return; const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending"))); const b = writeBatch(db); snap.forEach(d => b.update(d.ref, { status: "archived" })); await b.commit(); }

    window.generatePiePDF = async (dateLabel) => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID")));
        const rows = []; snap.forEach(d => { const data = d.data(); rows.push([data.customer?.name || '', data.items.map(i => i.name + (i.variantLabel ? ' (' + i.variantLabel + ')' : '')).join(', '), data.customer?.msg || '-']); });
        pdf.text("Pie Prep Sheet: " + dateLabel, 14, 15); pdf.autoTable({ head: [['Customer', 'Items', 'Note']], body: rows });
        pdf.save(`Pies_${dateLabel.replace(/ /g, '_')}.pdf`);
    }

    async function addCollectionDate() { const dateStr = document.getElementById('new-pie-date').value.trim(); const times = document.getElementById('new-pie-times').value.trim() || "9am - 5pm"; if(!dateStr) return alert("Enter a date"); const pieItems = allMenuItems.filter(i => i.category === 'PIES'); const initialInventory = {}; pieItems.forEach(p => initialInventory[p.name] = 0); const snap = await getDoc(doc(db, "settings", "collection_dates")); const cur = snap.data()?.dates || []; const updated = [...cur, { id: Date.now().toString(), label: dateStr, times: times, inventory: initialInventory, active: true }]; await setDoc(doc(db, "settings", "collection_dates"), { dates: updated }); document.getElementById('new-pie-date').value = ""; document.getElementById('new-pie-times').value = ""; }
</script>
</body>
