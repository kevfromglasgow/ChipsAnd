<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .app-header { background: var(--surface); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
        .tab-nav { display: flex; margin: 20px 32px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { background: none; border: none; color: #888; padding: 14px 22px; cursor: pointer; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .card { background: var(--surface); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .order-card { background: #1f1f1f; border-radius: 14px; padding: 20px; margin-bottom: 15px; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
        .btn-ready { background: var(--green); color: white; width: 100%; margin-bottom: 5px; }
        .btn-cancel { background: var(--red); color: white; width: 100%; font-size: 0.7rem; }
        .sort-btn { background: #333; color: white; padding: 5px 10px; margin: 0 2px; }
        input, select { background: #1f1f1f; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div style="width:300px; margin: 100px auto; text-align:center;">
            <input type="email" id="admin-email" placeholder="Email" style="width:100%">
            <input type="password" id="admin-pass" placeholder="Password" style="width:100%">
            <button class="btn" style="background:var(--orange); width:100%; color:white;" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <header class="app-header">
            <div style="font-family:'Playfair Display'; font-size:1.4rem;">Chips& Admin</div>
            <button class="btn" style="background:#333; color:white;" onclick="signOut(auth)">Logout</button>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" onclick="showTab('live', this)">Live Orders</button>
            <button class="tab-btn" onclick="showTab('pies', this)">Pie Batch</button>
            <button class="tab-btn" onclick="showTab('menu', this)">Inventory</button>
        </nav>

        <div style="padding: 0 32px;">
            <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

            <div id="tab-pies" class="tab-panel hidden">
                <div class="card">
                    <button class="btn" style="width:100%; background:var(--orange); color:white; margin-bottom:10px" onclick="generatePiePDF()">Download PDF Prep Sheet</button>
                    <button class="btn" style="width:100%; background:#444; color:white;" onclick="archivePies()">Archive All Pies</button>
                </div>
                <div id="pie-list"></div>
            </div>

            <div id="tab-menu" class="tab-panel hidden">
                <div class="card">
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                        <input type="text" id="new-name" placeholder="Name">
                        <input type="number" id="new-price" placeholder="Price">
                        <select id="new-cat">
                            <option value="CHIPS">CHIPS</option>
                            <option value="PIES">PIES</option>
                            <option value="TOASTIES">TOASTIES</option>
                            <option value="PASTA POTS">PASTA POTS</option>
                            <option value="SIDES">SIDES</option>
                            <option value="DRINKS">DRINKS</option>
                        </select>
                    </div>
                    <button class="btn" style="background:var(--orange); color:white; width:100%" onclick="addItem()">Add to Menu</button>
                </div>
                <div id="menu-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, where, orderBy, getDocs, writeBatch, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value);
        onAuthStateChanged(auth, user => {
            if(user) { document.getElementById('login-gate').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); initAdmin(); }
            else document.getElementById('login-gate').classList.remove('hidden');
        });

        function initAdmin() {
            // Watch Pending Orders (Live & Pies)
            onSnapshot(query(collection(db, "orders"), where("status", "==", "pending"), orderBy("createdAt", "desc")), snap => {
                const live = document.getElementById('orders-list'); const pie = document.getElementById('pie-list');
                live.innerHTML = ""; pie.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data(); const div = document.createElement('div'); div.className = 'order-card';
                    div.innerHTML = `<strong>#${d.id.slice(-4).toUpperCase()}</strong> - ${data.customer?.name || 'Walk-up'}
                        <p>${data.items.map(i => i.name).join(', ')}</p>
                        <p style="color:#888; font-size:0.8rem;">${data.customer?.msg || ''}</p>
                        ${data.type === 'PICKUP' ? `<button class="btn btn-ready" onclick="updateStatus('${d.id}', 'ready')">MARK READY</button>` : ''}
                        <button class="btn btn-cancel" onclick="cancelOrder('${d.id}')">CANCEL ORDER</button>`;
                    data.type === 'PRE-ORDER' ? pie.appendChild(div) : live.appendChild(div);
                });
            });

            // Watch Inventory with Sorting
            onSnapshot(query(collection(db, "menu"), orderBy("category"), orderBy("sortOrder", "asc")), snap => {
                const list = document.getElementById('menu-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data(); const div = document.createElement('div');
                    div.style = "display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333";
                    div.innerHTML = `<div><span style="color:#888; font-size:0.7rem;">${item.category}</span><br><strong>${item.name}</strong></div>
                        <div>
                            <button class="sort-btn" onclick="moveItem('${d.id}', ${item.sortOrder}, -1)">↑</button>
                            <button class="sort-btn" onclick="moveItem('${d.id}', ${item.sortOrder}, 1)">↓</button>
                            <button onclick="deleteDoc(doc(db, 'menu', '${d.id}'))" style="color:red; background:none; border:none; margin-left:10px">×</button>
                        </div>`;
                    list.appendChild(div);
                });
            });
        }

        window.moveItem = async (id, currentSort, direction) => {
            await updateDoc(doc(db, "menu", id), { sortOrder: currentSort + direction });
        };

        window.addItem = async () => {
            await addDoc(collection(db, "menu"), { 
                name: document.getElementById('new-name').value, 
                price: parseFloat(document.getElementById('new-price').value), 
                category: document.getElementById('new-cat').value, 
                is_available: true,
                sortOrder: 99 
            });
        };

        window.updateStatus = async (id, status) => await updateDoc(doc(db, "orders", id), { status });
        window.cancelOrder = async (id) => { if(confirm("Cancel?")) await deleteDoc(doc(db, "orders", id)); };
        window.archivePies = async () => {
            const s = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending")));
            const b = writeBatch(db); s.forEach(d => b.update(d.ref, { status: "archived" })); await b.commit();
        };

        window.showTab = (name, btn) => {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.remove('hidden'); btn.classList.add('active');
        };

        window.generatePiePDF = async () => {
            const { jsPDF } = window.jspdf; const docPDF = new jsPDF();
            const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("status", "==", "pending")));
            const rows = []; snap.forEach(d => { const data = d.data(); rows.push([data.customer.name, data.customer.phone, data.items.map(i => i.name).join(", "), data.customer.msg || '-']); });
            docPDF.text("Pie Prep Sheet", 14, 15); docPDF.autoTable({ startY: 20, head: [['Customer', 'Phone', 'Items', 'Notes']], body: rows });
            docPDF.save("Pie_Prep.pdf");
        };

        window.signOut = signOut; window.deleteDoc = deleteDoc; window.doc = doc;
    </script>
</body>
</html>
