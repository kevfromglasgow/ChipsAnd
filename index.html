<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --surface-2: #1F1F1F; --text: #F0EDE8; --muted: #888; --green: #2ecc71; --red: #e74c3c; --border: rgba(255,255,255,0.08); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; text-align: left; }
        .app-header { background: var(--surface); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-admin { height: 35px; width: auto; }
        .tab-nav { display: flex; margin: 20px 20px 0; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 18px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
        .tab-btn.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .content-area { padding: 20px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 18px; border: 1px solid var(--border); }
        .order-card { background: var(--surface-2); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--orange); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-cancel { background: var(--red); color: white; }
        input[type=text], input[type=email], input[type=password], input[type=number], select { background: var(--surface-2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 16px; /* Prevents iOS zoom on focus */ }
        input:focus, select:focus { outline: none; border-color: var(--orange); }
        .hidden { display: none !important; }
        #login-gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .status-bar { margin: 20px; background: var(--surface); border-radius: 14px; padding: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .inv-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: grab; gap: 10px; }
        .drag-handle { color: var(--muted); cursor: grab; flex-shrink: 0; }
        .inv-name-input { flex: 2; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; }
        .inv-price-input { width: 60px; background: transparent; border: none; color: var(--orange); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; text-align: right; outline: none; }
        .stock-input { width: 55px !important; padding: 4px !important; text-align: center !important; }

        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 600px) {
            .app-header { padding: 10px 15px; }
            .status-bar { flex-direction: column; gap: 12px; text-align: center; }
            .status-bar div { text-align: center !important; }
            
            /* Collection Date Card Fix */
            .card > div[style*="display:flex"] { 
                flex-direction: column !important; 
                gap: 15px !important; 
            }
            .card .btn-group {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                width: 100%;
            }
            .btn-cancel { grid-column: span 2; } /* Make the X button full width on mobile if needed, or keep it small */
            
            /* Date Picker Inputs */
            div[style*="display:grid; grid-template-columns: 1fr 100px auto"] {
                grid-template-columns: 1fr !important;
            }
            
            /* Inventory Inputs */
            .inv-row { flex-wrap: wrap; }
            .inv-name-input { flex: 1 1 100%; font-weight: bold; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div id="login-gate">
    <div style="width:320px;text-align:center;">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="width:200px; margin-bottom:30px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn btn-primary" id="login-btn" style="padding:14px;">Sign In</button>
        </div>
    </div>
</div>

<div id="admin-content" class="hidden">
    <header class="app-header">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-admin">
        <button class="btn" style="background:#2a2a2a;color:white;padding:8px 12px;font-size:0.75rem;" id="logout-btn">Logout</button>
    </header>

    <div class="status-bar">
        <div style="font-size: 1rem; text-align: left;">Shop Status: <strong id="status-text">...</strong></div>
        <button class="btn btn-primary" id="toggle-shop-btn" style="padding:8px 16px;">Toggle Status</button>
    </div>

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">Orders</button>
        <button class="tab-btn" data-tab="pies">Batches</button>
        <button class="tab-btn" data-tab="menu">Inventory</button>
        <a href="insights.html" target="_blank" class="tab-btn" style="text-decoration:none;">📈 Insights</a>
    </nav>

    <div class="content-area">
        <div id="tab-live" class="tab-panel"><div id="orders-list"></div></div>

        <div id="tab-pies" class="tab-panel hidden">
            <div class="card" style="border-color:var(--orange)">
                <h3 style="margin-bottom:16px; font-size: 1.1rem;">Collection Dates</h3>
                <div style="display:grid; grid-template-columns: 1fr 100px auto; gap:10px; margin-bottom:12px;">
                    <input type="text" id="new-pie-date" placeholder="Date">
                    <input type="text" id="new-pie-times" placeholder="Times">
                    <button class="btn btn-primary" id="add-date-btn">Add</button>
                </div>
                <div id="dates-list-admin"></div>
            </div>
        </div>

        <div id="tab-menu" class="tab-panel hidden">
            <div class="card">
                <h3>Categories</h3>
                <div id="cat-tags-list" style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;"></div>
                <div style="display:flex;gap:10px;">
                    <input type="text" id="new-cat-name" placeholder="New category">
                    <button class="btn btn-primary" id="add-cat-btn">Add</button>
                </div>
            </div>
            <div id="menu-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc, addDoc, deleteDoc, collection, query, where, orderBy, getDocs, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allMenuItems = []; let allCategories = []; let _suppressRender = false;

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            initAdmin();
        } else {
            document.getElementById('login-gate').style.display = 'flex';
            document.getElementById('admin-content').classList.add('hidden');
        }
    });

    document.getElementById('login-btn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-pass').value).catch(e => alert(e.message));
    };
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    function initAdmin() {
        onSnapshot(doc(db, "settings", "truck_status"), snap => {
            const d = snap.data() || {};
            window._isClosed = !!d.is_closed;
            document.getElementById('status-text').innerText = d.is_closed ? "CLOSED" : "OPEN";
            document.getElementById('status-text').style.color = d.is_closed ? "var(--red)" : "var(--green)";
        });

        onSnapshot(doc(db, "settings", "collection_dates"), snap => { if (!_suppressRender) renderDatesAdmin(snap.data()?.dates || []); });

        onSnapshot(doc(db, "settings", "categories"), snap => {
            allCategories = snap.data()?.list || [];
            renderCatTags();
            if (!_suppressRender) renderMenuList();
        });

        onSnapshot(collection(db, "menu"), snap => {
            allMenuItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allMenuItems.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999));
            if (!_suppressRender) renderMenuList();
            getDoc(doc(db, "settings", "collection_dates")).then(s => { if(s.exists() && !_suppressRender) renderDatesAdmin(s.data().dates); });
        });

        onSnapshot(query(collection(db, "orders"), where("status", "==", "pending"), where("paymentStatus", "==", "PAID"), orderBy("createdAt", "desc")), snap => {
            if (!_suppressRender) renderOrders(snap);
        });

        document.getElementById('toggle-shop-btn').onclick = () => updateDoc(doc(db, "settings", "truck_status"), { is_closed: !window._isClosed });
        document.getElementById('add-date-btn').onclick = addCollectionDate;
        document.getElementById('add-cat-btn').onclick = addCategory;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            };
        });
    }

    async function renderDatesAdmin(dates) {
        const wrap = document.getElementById('dates-list-admin'); wrap.innerHTML = "";
        if (!allMenuItems.length) return;
        const orderSnap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("paymentStatus", "==", "PAID")));
        const allPreOrders = orderSnap.docs.map(doc => doc.data());
        const piesFromMenu = allMenuItems.filter(i => i.category === 'PIES');

        dates.forEach(d => {
            const dateOrders = allPreOrders.filter(o => o.collectionDate === d.label && o.status === "pending");
            const pieTotals = {};
            dateOrders.forEach(o => o.items.forEach(i => pieTotals[i.name] = (pieTotals[i.name] || 0) + 1));

            let invHtml = `<div style="margin-top:15px; display:grid; grid-template-columns: 1fr auto auto; gap:10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                            <div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase;">Flavor</div><div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; text-align:center;">Sold</div><div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; text-align:right;">Stock</div>`;
            piesFromMenu.forEach(p => {
                const stock = d.inventory[p.name] || 0;
                invHtml += `<span style="font-size:0.8rem">${p.name}:</span><span style="color:var(--orange); text-align:center; font-size:0.8rem">${pieTotals[p.name] || 0}</span>
                <input type="number" value="${stock}" class="stock-input" 
                       onfocus="_suppressRender=true" 
                       onblur="_suppressRender=false" 
                       onchange="updatePieStock('${d.id}', '${p.name}', this.value)">`;
            });
            invHtml += `</div>`;

            const div = document.createElement('div'); div.className = 'card'; div.style.background = "var(--surface-2)";
            div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:start; text-align:left;">
                <div style="flex:1">
                    <strong style="font-size:0.9rem">${d.label}</strong><br>
                    <span style='font-size:0.75rem;color:var(--orange)'>${d.times} — ${dateOrders.length} Orders</span>
                </div>
                <div class="btn-group" style='display:flex; gap:6px;'>
                    <button class='btn' style='background:#34495e; padding: 6px; flex:1;' onclick="generatePiePDF('${d.label}')"><span style="font-size:1.2rem">📄</span></button>
                    <button class='btn' style='background:#673ab7; padding: 6px; flex:1;' onclick="generateTallyPDF('${d.label}')"><span style="font-size:1.2rem">📊</span></button>
                    <button class='btn' style='background:${d.active ? 'var(--green)' : '#444'}; font-size:0.7rem; padding: 6px 12px; flex:1;' onclick="toggleDate('${d.id}', event)">${d.active ? 'Online' : 'Hidden'}</button>
                    <button class='btn btn-cancel' style="padding: 6px;" onclick="deleteDate('${d.id}')">✕</button>
                </div>
            </div>${invHtml}`;
            wrap.appendChild(div);
        });
    }

    function renderOrders(snap) {
        const live = document.getElementById('orders-list'); live.innerHTML = "";
        snap.forEach(d => {
            const data = d.data(); if (data.type !== 'PICKUP') return;
            const div = document.createElement('div'); div.className = 'order-card';
            div.innerHTML = `<div style='display:flex;justify-content:space-between'><strong>#${d.id.slice(-4).toUpperCase()}</strong><span class='btn-primary' style='padding:2px 8px;border-radius:5px;font-size:0.7rem'>${data.type}</span></div><div style='margin:10px 0'><strong>${data.customer?.name || ''}</strong><ul style='list-style:none; font-size:0.8rem; color:var(--muted); text-align:left;'>${data.items.map(i => `<li>${i.name}</li>`).join('')}</ul></div><div style='display:flex;gap:10px'><button class='btn btn-ready' style="flex:1">Ready</button><button class='btn btn-cancel' style="flex:1">Cancel</button></div>`;
            div.querySelector('.btn-ready').onclick = () => updateDoc(doc(db, "orders", d.id), { status: 'ready' });
            div.querySelector('.btn-cancel').onclick = () => confirm('Cancel?') && updateDoc(doc(db, "orders", d.id), { status: 'cancelled' });
            live.appendChild(div);
        });
    }

    function renderMenuList() {
        if (_suppressRender) return;
        const list = document.getElementById('menu-list'); list.innerHTML = "";
        allCategories.forEach(cat => {
            const items = allMenuItems.filter(i => i.category === cat);
            const sec = document.createElement('div'); sec.innerHTML = `<div style='color:var(--orange); font-size:0.7rem; margin: 20px 0 10px; text-transform:uppercase; text-align:left;'>${cat}</div>`;
            const container = document.createElement('div'); container.className = 'card'; container.style.padding = "0";
            items.forEach(item => container.appendChild(makeRow(item)));
            list.appendChild(sec); sec.appendChild(container);
            initDragEvents(container, '.inv-row', saveItemOrder);
        });
    }

    function makeRow(item) {
        const row = document.createElement('div'); row.className = 'inv-row'; row.draggable = true; row.dataset.id = item.id;
        const hasV = item.variants && item.variants.length > 0;
        row.innerHTML = `<span class='drag-handle'>⠿</span><input type='text' class='inv-name-input' value="${item.name}"><div style="display:flex; align-items:center; gap:4px;"><span style="color:var(--orange); font-size:0.8rem;">£</span><input type='number' class='inv-price-input' value="${parseFloat(item.price || 0).toFixed(2)}" step="0.01" ${hasV ? 'disabled style="opacity:0.4"' : ''} onfocus="_suppressRender=true" onblur="_suppressRender=false; updateItemPrice('${item.id}', this.value)"></div><input type='checkbox' class='inv-avail-check' ${item.is_available ? 'checked' : ''} style='width:auto; cursor:pointer;'><button style='background:none; border:none; color:var(--red); cursor:pointer;'>✕</button>`;
        const [nameInp, priceInp, availInp] = row.querySelectorAll('input');
        nameInp.onfocus = () => _suppressRender = true;
        nameInp.onblur = async (e) => { _suppressRender = false; if(e.target.value.trim() !== item.name) await updateDoc(doc(db, "menu", item.id), { name: e.target.value.trim() }); };
        availInp.onchange = async () => await updateDoc(doc(db, "menu", item.id), { is_available: availInp.checked });
        row.querySelector('button:last-child').onclick = () => confirm('Delete item?') && deleteDoc(doc(db, 'menu', item.id));
        return row;
    }

    function renderCatTags() {
        const wrap = document.getElementById('cat-tags-list'); wrap.innerHTML = "";
        allCategories.forEach(cat => {
            const tag = document.createElement('div'); tag.className = 'cat-tag'; tag.draggable = true; 
            tag.innerHTML = `<span>${cat}</span><button style='background:none;border:none;color:var(--muted);cursor:pointer;margin-left:8px;'>✕</button>`;
            tag.querySelector('button').onclick = (e) => { e.stopPropagation(); const newList = allCategories.filter(c => c !== cat); setDoc(doc(db, "settings", "categories"), { list: newList }); };
            wrap.appendChild(tag);
        });
        initDragEvents(wrap, '.cat-tag', async (container) => { 
            const newList = [...container.querySelectorAll('.cat-tag span')].map(s => s.innerText.trim()); 
            await setDoc(doc(db, "settings", "categories"), { list: newList }); 
        });
    }

    function renderCatDropdown() { const sel = document.getElementById('new-cat'); if(!sel) return; sel.innerHTML = '<option value="">Category</option>'; allCategories.forEach(c => { const o = document.createElement('option'); o.value = c; o.innerText = c; sel.appendChild(o); }); }

    function initDragEvents(container, selector, onDropCallback) {
        let draggedItem = null;
        container.addEventListener('dragstart', (e) => { draggedItem = e.target.closest(selector); if (draggedItem) { draggedItem.classList.add('dragging'); _suppressRender = true; } });
        container.addEventListener('dragend', (e) => { if (draggedItem) { draggedItem.classList.remove('dragging'); _suppressRender = false; onDropCallback(container); } });
        container.addEventListener('dragover', (e) => { e.preventDefault(); const after = getDragAfterElement(container, e.clientY, selector); if (after == null) container.appendChild(draggedItem); else container.insertBefore(draggedItem, after); });
    }

    function getDragAfterElement(container, y, selector) {
        const draggables = [...container.querySelectorAll(`${selector}:not(.dragging)`)];
        return draggables.reduce((closest, child) => {
            const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    async function saveItemOrder(container) {
        const rows = [...container.querySelectorAll('.inv-row')]; const b = writeBatch(db);
        rows.forEach((r, i) => b.update(doc(db, "menu", r.dataset.id), { sortOrder: i })); await b.commit();
    }

    window.updateItemPrice = async (id, val) => { const p = parseFloat(val); if(!isNaN(p)) await updateDoc(doc(db, "menu", id), { price: p }); };
    window.updatePieStock = async (id, pie, val) => { const num = parseInt(val); if (isNaN(num)) return; const s = await getDoc(doc(db, "settings", "collection_dates")); const dts = s.data().dates.map(d => d.id === id ? {...d, inventory: {...d.inventory, [pie]: num}} : d); await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts }); };
    
    window.toggleDate = async (id, event) => { 
        const btn = event.target.closest('button');
        const currentlyOnline = btn.innerText === 'Online';
        _suppressRender = true;
        btn.innerText = currentlyOnline ? 'Hidden' : 'Online';
        btn.style.background = currentlyOnline ? '#444' : 'var(--green)';
        const s = await getDoc(doc(db, "settings", "collection_dates")); 
        const dts = s.data().dates.map(d => d.id === id ? {...d, active: !currentlyOnline} : d); 
        await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts });
        setTimeout(() => { _suppressRender = false; }, 800);
    };

    window.deleteDate = async (id) => { 
        if(!confirm("Delete?")) return; 
        _suppressRender = true;
        const s = await getDoc(doc(db, "settings", "collection_dates")); 
        const dts = s.data().dates.filter(d => d.id !== id); 
        await updateDoc(doc(db, "settings", "collection_dates"), { dates: dts });
        setTimeout(() => { _suppressRender = false; }, 800);
    };

    window.generatePiePDF = async (dateLabel) => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"), where("status","==","pending")));
        const rows = snap.docs.map(d => [d.data().customer?.name || '', d.data().items.map(i => i.name).join(', '), d.data().customer?.msg || '-']);
        pdf.text("Order Sheet: " + dateLabel, 14, 15); pdf.autoTable({ head: [['Customer', 'Items', 'Notes']], body: rows });
        pdf.save(`Orders_${dateLabel}.pdf`);
    }

    window.generateTallyPDF = async (dateLabel) => {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF();
        const snap = await getDocs(query(collection(db, "orders"), where("type", "==", "PRE-ORDER"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"), where("status", "==", "pending")));
        const totals = {}; let grandTotal = 0;
        snap.forEach(d => { d.data().items.forEach(item => { totals[item.name] = (totals[item.name] || 0) + 1; grandTotal++; }); });
        const rows = Object.entries(totals).map(([name, qty]) => [name, qty]);
        rows.push([{ content: 'TOTAL PIES', styles: { fontStyle: 'bold', fillColor: [244, 113, 43], textColor: [255,255,255] } }, { content: grandTotal, styles: { fontStyle: 'bold', fillColor: [244, 113, 43], textColor: [255,255,255] } }]);
        pdf.text("Tally: " + dateLabel, 14, 15); pdf.autoTable({ head: [['Variety', 'Qty']], body: rows });
        pdf.save(`Tally_${dateLabel}.pdf`);
    }

    async function addCategory() { const name = document.getElementById('new-cat-name').value.toUpperCase().trim(); if (!name || allCategories.includes(name)) return; setDoc(doc(db, "settings", "categories"), { list: [...allCategories, name] }); document.getElementById('new-cat-name').value=""; }
    async function addCollectionDate() { const dateStr = document.getElementById('new-pie-date').value.trim(); const times = document.getElementById('new-pie-times').value.trim() || "9am - 5pm"; if(!dateStr) return alert("Enter a date"); const pies = allMenuItems.filter(i => i.category === 'PIES'); const inv = {}; pies.forEach(p => inv[p.name] = 0); const snap = await getDoc(doc(db, "settings", "collection_dates")); const updated = [...(snap.data()?.dates || []), { id: Date.now().toString(), label: dateStr, times, inventory: inv, active: true }]; await setDoc(doc(db, "settings", "collection_dates"), { dates: updated }); document.getElementById('new-pie-date').value = ""; document.getElementById('new-pie-times').value = ""; }
</script>
</body>
</html>
