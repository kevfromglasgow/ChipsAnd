        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8",
            authDomain: "chipsand-13831.firebaseapp.com",
            projectId: "chipsand-13831",

            messagingSenderId: "105749630976",
            appId: "1:105749630976:web:038ab2c3ce81612064c8e5"
          };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function createOrder() {
            // Write the "Pending" order so the Admin sees it instantly
            await addDoc(collection(db, "orders"), {
                status: "pending",
                createdAt: serverTimestamp()
            });
        }
        createOrder();
