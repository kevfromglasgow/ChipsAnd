<!DOCTYPE html>
<html>
<head>
    <title>Success!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>body { text-align: center; font-family: sans-serif; padding: 50px; background: #f9f9f9; }</style>
</head>
<body>
    <div style="font-size: 50px;">✅</div>
    <h1>Order Received!</h1>
    <p>Head over to the truck to collect your food.</p>
    <a href="menu.html" style="color: #0070f3; text-decoration: none; font-weight: bold;">Order More</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8",
            authDomain: "chipsand-13831.firebaseapp.com",
            projectId: "chipsand-13831",
            storageBucket: "chipsand-13831.firebasestorage.app",
            messagingSenderId: "105749630976",
            appId: "1:105749630976:web:038ab2c3ce81612064c8e5"
          };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        
        // If coming from Stripe, we need to log the order details
        if (params.get('status') === 'success') {
            const savedCart = JSON.parse(localStorage.getItem('last_cart') || '[]');
            async function logStripeOrder() {
                await addDoc(collection(db, "orders"), {
                    items: savedCart,
                    status: "pending",
                    type: "Paid Online",
                    createdAt: serverTimestamp()
                });
                localStorage.removeItem('last_cart');
            }
            logStripeOrder();
        }
    </script>
</body>
</html>
