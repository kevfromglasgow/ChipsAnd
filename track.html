<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | ChipsAnd</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 60px 20px; }
        .track-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 24px; max-width: 450px; margin: 0 auto; }
        .brand { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 20px; }
        .brand span { color: var(--orange); }
        .status-badge { display: inline-block; padding: 15px 30px; border-radius: 40px; font-weight: bold; text-transform: uppercase; margin: 20px 0; border: 1px solid var(--orange); color: var(--orange); }
        .paid { background: #2ecc71; color: white; border-color: #2ecc71; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div class="brand">Chips<span>&</span></div>

    <div class="track-card">
        <div id="order-id" style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">LOADING...</div>
        <h2 style="font-family: 'Playfair Display';">Order Status</h2>
        
        <div id="status-container">
            <div class="status-badge pulse">Checking Payment...</div>
        </div>

        <p id="msg" style="color: #888; font-size: 0.9rem; line-height: 1.5;"></p>
        
        <button onclick="window.location.href='menu.html'" style="background:none; border:1px solid #333; color:#666; padding:10px 20px; border-radius:8px; margin-top:30px; cursor:pointer;">Back to Menu</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');

        if (orderId) {
            document.getElementById('order-id').innerText = `ORDER #${orderId.slice(-6).toUpperCase()}`;
            
            onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                const container = document.getElementById('status-container');
                const msg = document.getElementById('msg');
                if (!docSnap.exists()) return;

                const data = docSnap.data();

                if (data.paymentStatus === 'UNPAID') {
                    container.innerHTML = `<div class="status-badge pulse">Waiting for Payment</div>`;
                    msg.innerText = "Your order is logged, but we haven't confirmed payment yet. If you closed the payment window, please try again.";
                } else if (data.paymentStatus === 'PAID') {
                    if (data.status === 'pending') {
                        container.innerHTML = `<div class="status-badge paid">✅ Payment Received</div>`;
                        msg.innerText = "We've got your order and your payment! Our team is on it now.";
                    } else if (data.status === 'ready') {
                        container.innerHTML = `<div class="status-badge paid" style="background:var(--orange); border-color:var(--orange)">🔥 Ready to Collect!</div>`;
                        msg.innerText = "Your order is fresh and hot! Come to the truck to collect.";
                    }
                }
            });
        }
    </script>
</body>
</html>
