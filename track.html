<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | ChipsAnd | Elgin</title>
    <style>
        :root { --brand-orange: #e67e22; --brand-dark: #1a1a1a; --brand-grey: #333333; --cream-bg: #FDF6E3; --charcoal-text: #333333; }
        body { font-family: -apple-system, sans-serif; background: var(--cream-bg); color: var(--charcoal-text); text-align: center; padding: 40px 20px; }
        
        .track-logo { max-width: 130px; margin-bottom: 30px; }
        
        .tracking-card {
            background: white; padding: 30px; border-radius: 20px;
            max-width: 450px; margin: 0 auto;
            box-shadow: 6px 6px 15px #dfdbcb, -6px -6px 15px #ffffff;
            border: 2px solid var(--brand-orange);
        }

        h1 { margin-top: 0; color: var(--brand-grey); }
        .order-id { color: #888; font-size: 0.9rem; letter-spacing: 1px; }

        /* Status Pulsing Badge */
        .live-status {
            display: inline-block; padding: 12px 25px; border-radius: 30px;
            font-weight: bold; font-size: 1.2rem; margin: 25px 0;
            text-transform: uppercase; letter-spacing: 2px;
            color: white; animation: pulse 1.5s infinite;
        }
        .status-ready { background: #27ae60; border: 2px solid white; box-shadow: 0 0 20px rgba(39, 174, 96, 0.5); }
        .status-cooking { background: #f39c12; }
        .status-cancelled { background: #c0392b; animation: none; opacity: 0.7; }

        /* Note from Admin */
        .message-box {
            background: #fff8e1; color: #795548;
            padding: 15px; border-radius: 12px;
            margin-top: 25px; font-style: italic; font-size: 0.95rem;
            border-left: 5px solid var(--brand-orange); text-align: left;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header style="margin-bottom: 30px;"><img src="ChipsAndLogo.jpg" alt="ChipsAnd Logo" class="track-logo"></header>
    
    <div class="tracking-card">
        <h1>Tracking Your Food</h1>
        <div class="order-id" id="track-id-display">Connecting to truck...</div>
        
        <div id="live-status-container"></div>
        
        <div id="truck-message" class="hidden"></div>
        
        <p style="margin-top:25px; color:#666; font-size:0.9rem;">This page updates automatically. We'll chirp when it's time to collect!</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Already set for ChipsAnd)
        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get Order ID from URL
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');

        if (orderId) {
            document.getElementById('track-id-display').innerText = `ID: #${orderId.slice(-4)}`;
            
            // Listen to THIS specific order
            onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                const liveStatus = document.getElementById('live-status-container');
                const truckMessage = document.getElementById('truck-message');

                if (!docSnap.exists()) {
                    liveStatus.innerHTML = "<div class='live-status status-cancelled'>Not Found</div>";
                    return;
                }

                const data = docSnap.data();
                const status = data.status || "pending";
                const note = data.note || "";

                // 1. UPDATE LIVE STATUS BADGE
                let badgeHTML = "";
                if (status === "pending") badgeHTML = `<div class="live-status status-cooking">👨‍🍳 Cooking Now</div>`;
                if (status === "ready") badgeHTML = `<div class="live-status status-ready">✅ Ready for Collection!</div>`;
                if (status === "cancelled") badgeHTML = `<div class="live-status status-cancelled">❌ Order Cancelled</div>`;
                
                liveStatus.innerHTML = badgeHTML;

                // 2. UPDATE TRUCK NOTE
                if (note) {
                    truckMessage.innerHTML = `<strong>Note from Truck:</strong><br>"${note}"`;
                    truckMessage.className = "message-box";
                } else {
                    truckMessage.className = "hidden";
                }
            });
        } else {
            document.getElementById('track-id-display').innerText = `Error: No Order ID Found`;
        }
    </script>
</body>
</html>
