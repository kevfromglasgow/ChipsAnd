<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Order | ChipsAnd</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 60px 20px; margin: 0; }
        
        .track-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 24px; max-width: 450px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px; }
        .brand-name span { color: var(--orange); }
        
        /* Status Badges */
        .status-badge { display: inline-block; padding: 15px 30px; border-radius: 40px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0; font-size: 1.1rem; }
        .pending-pickup { background: rgba(244,113,43,0.15); color: var(--orange); border: 1px solid var(--orange); animation: pulse 2s infinite; }
        .pending-preorder { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid #3498db; }
        .ready { background: #2ecc71; color: white; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* Payment Section */
        .payment-card { background: rgba(244, 113, 43, 0.08); border: 1px dashed var(--orange); border-radius: 20px; padding: 25px; margin-top: 25px; }
        .payment-card h3 { font-size: 1rem; margin-bottom: 8px; color: var(--text); }
        .pay-btn { display: block; background: var(--orange); color: white; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        .pay-btn:hover { filter: brightness(1.1); }
        
        .copy-ref-box { margin-top: 15px; background: #000; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #333; position: relative; }
        .copy-ref-box:active { background: #111; }
        .ref-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .ref-code { font-family: monospace; color: var(--orange); font-size: 1rem; font-weight: bold; }
        .copy-hint { font-size: 0.65rem; color: #666; display: block; margin-top: 4px; }

        .nav-btn { background: none; border: 1px solid #444; color: #888; padding: 12px 24px; border-radius: 12px; cursor: pointer; margin-top: 40px; transition: 0.3s; font-family: 'DM Sans', sans-serif; }
        .nav-btn:hover { border-color: var(--orange); color: var(--orange); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="brand-name">Chips<span>&</span></div>

    <div class="track-card">
        <div id="order-id" style="color: var(--orange); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px;">CONNECTING...</div>
        <h2 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 10px;">Order Status</h2>
        
        <div id="status-container">
            <div class="status-badge" style="color:#444">Locating Order...</div>
        </div>

        <div id="payment-area" class="hidden">
            <div class="payment-card">
                <h3>Instant Payment Required</h3>
                <p style="font-size: 0.85rem; color: #bbb; line-height: 1.4; margin-bottom: 0;">
                    To secure your batch of pies, please pay via <strong>Bank Transfer</strong>.
                </p>
                
                <div class="copy-ref-box" id="copy-ref-btn">
                    <span class="ref-label">Bank Reference</span>
                    <span class="ref-code" id="ref-text">PIE-WAITING</span>
                    <span class="copy-hint">(Tap to Copy)</span>
                </div>

                <a id="crezco-btn" href="https://app.crezco.com/Ssx0PBsu5Eyqq7O-KGPgQw" target="_blank" class="pay-btn">
                    Pay £<span id="pay-total">0.00</span> Now
                </a>
            </div>
        </div>

        <div id="order-details-msg" style="color: #888; font-size: 0.9rem; margin-top: 20px; line-height: 1.4;">
            Keep this page open. We'll update you as soon as your order is ready for collection.
        </div>
        
        <button class="nav-btn" onclick="window.location.href='menu.html'">Return to Home</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", 
            authDomain: "chipsand-13831.firebaseapp.com", 
            projectId: "chipsand-13831", 
            storageBucket: "chipsand-13831.firebasestorage.app", 
            messagingSenderId: "105749630976", 
            appId: "1:105749630976:web:038ab2c3ce81612064c8e5" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');

        if (orderId) {
            document.getElementById('order-id').innerText = `ORDER ID: #${orderId.slice(-6).toUpperCase()}`;
            
            onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                const container = document.getElementById('status-container');
                const msgBox = document.getElementById('order-details-msg');
                const payArea = document.getElementById('payment-area');

                if (!docSnap.exists()) {
                    container.innerHTML = `<div class="status-badge" style="color:#666">Order Not Found</div>`;
                    return;
                }

                const data = docSnap.data();
                const status = data.status || 'pending';

                if (status === 'pending') {
                    if (data.type === 'PRE-ORDER') {
                        container.innerHTML = `<div class="status-badge pending-preorder">📅 Payment Pending</div>`;
                        msgBox.innerText = "Check the payment details below. Once confirmed, your batch will be reserved.";
                        
                        // Setup Reference & Amount
                        const total = (data.items || []).reduce((sum, i) => sum + i.price, 0);
                        const cleanName = (data.customer?.name || "CUST").replace(/[^a-z0-9]/gi, '').substring(0, 10).toUpperCase();
                        const refCode = `PIE-${cleanName}-${orderId.slice(-4).toUpperCase()}`;
                        
                        document.getElementById('pay-total').innerText = total.toFixed(2);
                        document.getElementById('ref-text').innerText = refCode;
                        payArea.classList.remove('hidden');

                        // Copy Logic
                        document.getElementById('copy-ref-btn').onclick = () => {
                            navigator.clipboard.writeText(refCode).then(() => {
                                alert("Reference copied! Paste this in your bank app.");
                            });
                        };

                    } else {
                        container.innerHTML = `<div class="status-badge pending-pickup">👨‍🍳 Cooking Now</div>`;
                        payArea.classList.add('hidden');
                    }
                } else if (status === 'ready') {
                    container.innerHTML = `<div class="status-badge ready">✅ Ready for Collection!</div>`;
                    msgBox.innerHTML = "<strong>Your order is ready!</strong><br>Show this screen to our staff at the truck.";
                    payArea.classList.add('hidden');
                    if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                } else if (status === 'archived') {
                    container.innerHTML = `<div class="status-badge" style="background:#333; color:#888">Order Completed</div>`;
                    msgBox.innerText = "This order has already been collected. Thanks for visiting Chips&!";
                    payArea.classList.add('hidden');
                }
            });
        } else {
            document.getElementById('order-id').innerText = "ERROR: NO ORDER ID";
        }
    </script>
</body>
</html>
