<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | ChipsAnd</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 60px 20px; }
        .track-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 24px; max-width: 450px; margin: 0 auto; }
        .brand { margin-bottom: 20px; display: flex; justify-content: center; }
        .status-badge { display: inline-block; padding: 14px 28px; border-radius: 40px; font-weight: bold; text-transform: uppercase; margin: 20px 0; border: 1px solid var(--orange); color: var(--orange); font-size: 0.9rem; }
        .badge-paid     { background: var(--green); color: white; border-color: var(--green); }
        .badge-ready    { background: var(--orange); color: white; border-color: var(--orange); }
        .badge-cancelled{ border-color: var(--red); color: var(--red); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .pulse { animation: pulse 2s infinite; }
        .back-btn { background: none; border: 1px solid #333; color: #666; padding: 10px 20px; border-radius: 8px; margin-top: 28px; cursor: pointer; font-family: 'DM Sans'; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="brand" onclick="window.location.href='menu.html'" style="cursor:pointer;">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="height:45px; width:auto;">
    </div>

    <div class="track-card">
        <div id="order-id" style="font-size:0.8rem;color:#888;margin-bottom:10px;">LOADING...</div>
        <h2 style="font-family:'Playfair Display';">Order Status</h2>
        <div id="status-container"><div class="status-badge pulse">Checking…</div></div>
        
        <div id="date-display" style="color:var(--orange); font-weight: bold; margin-bottom: 15px;"></div>
        
        <p id="msg" style="color:#888;font-size:0.9rem;line-height:1.6;margin-top:8px;"></p>
        <a href="menu.html" class="back-btn">Back to Menu</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const FB = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(FB);
        const db  = getFirestore(app);

        const orderId = new URLSearchParams(window.location.search).get('id');
        if (!orderId) { document.getElementById('msg').innerText = "No order ID found."; }
        else {
            document.getElementById('order-id').innerText = 'ORDER #' + orderId.slice(-6).toUpperCase();
            
            onSnapshot(doc(db, "orders", orderId), snap => {
                if (!snap.exists()) return;
                const data = snap.data();
                const container = document.getElementById('status-container');
                const msg = document.getElementById('msg');
                const dateBox = document.getElementById('date-display');

                // Display the collection date clearly
                if(data.collectionDate) {
                    dateBox.innerText = "Collection: " + data.collectionDate;
                }

                if (data.status === 'cancelled') {
                    container.innerHTML = '<div class="status-badge badge-cancelled">✕ Order Cancelled</div>';
                    msg.innerText = "This order has been cancelled. If this is a mistake, please contact us directly.";
                } 
                else if (data.paymentStatus === 'UNPAID') {
                    container.innerHTML = '<div class="status-badge pulse">Waiting for Payment</div>';
                    msg.innerText = "Payment hasn't been confirmed yet. If you've already paid, this will update shortly.";
                } 
                else if (data.paymentStatus === 'PAID') {
                    if (data.status === 'pending') {
                        container.innerHTML = '<div class="status-badge badge-paid">✅ Order Confirmed</div>';
                        
                        // Adaptive messaging based on order type
                        if (data.type === 'PRE-ORDER') {
                            msg.innerText = "Payment confirmed! Your pies are reserved. You'll also receive an email receipt shortly.";
                        } else {
                            msg.innerText = "Payment confirmed! We are preparing your food now.";
                        }
                    } 
                    else if (data.status === 'ready') {
                        container.innerHTML = '<div class="status-badge badge-ready">🔥 Ready to Collect!</div>';
                        msg.innerText = "Your order is ready! Head to the truck and show this screen to collect.";
                    }
                }
            });
        }
    </script>
</body>
</html>
