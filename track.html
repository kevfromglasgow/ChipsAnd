<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Order | ChipsAnd</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 60px 20px; }
        .track-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 24px; max-width: 450px; margin: 0 auto; }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px; }
        .brand-name span { color: var(--orange); }
        
        /* Status Badges */
        .status-badge { display: inline-block; padding: 15px 30px; border-radius: 40px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0; font-size: 1.1rem; }
        
        .pending-pickup { background: rgba(244,113,43,0.15); color: var(--orange); border: 1px solid var(--orange); animation: pulse 2s infinite; }
        .pending-preorder { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid #3498db; }
        .ready { background: #2ecc71; color: white; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .nav-btn { background: none; border: 1px solid #444; color: #888; padding: 12px 24px; border-radius: 12px; cursor: pointer; margin-top: 40px; transition: 0.3s; font-family: 'DM Sans', sans-serif; }
        .nav-btn:hover { border-color: var(--orange); color: var(--orange); }
    </style>
</head>
<body>

    <div class="brand-name">Chips<span>&</span></div>

    <div class="track-card">
        <div id="order-id" style="color: var(--orange); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px;">CONNECTING...</div>
        <h2 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 10px;">Order Status</h2>
        
        <div id="status-container">
            <div class="status-badge" style="color:#444">Locating Order...</div>
        </div>

        <div id="order-details-msg" style="color: #888; font-size: 0.9rem; margin-top: 20px; line-height: 1.4;">
            Keep this page open. We'll update you as soon as your order is ready for collection.
        </div>
        
        <button class="nav-btn" onclick="window.location.href='menu.html'">Return to Home</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", 
            authDomain: "chipsand-13831.firebaseapp.com", 
            projectId: "chipsand-13831", 
            storageBucket: "chipsand-13831.firebasestorage.app", 
            messagingSenderId: "105749630976", 
            appId: "1:105749630976:web:038ab2c3ce81612064c8e5" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');

        if (orderId) {
            document.getElementById('order-id').innerText = `ORDER ID: #${orderId.slice(-6).toUpperCase()}`;
            
            onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                const container = document.getElementById('status-container');
                const msgBox = document.getElementById('order-details-msg');

                if (!docSnap.exists()) {
                    container.innerHTML = `<div class="status-badge" style="color:#666">Order Not Found</div>`;
                    return;
                }

                const data = docSnap.data();
                const isPreOrder = data.type === 'PRE-ORDER';
                const status = data.status || 'pending';

                if (status === 'pending') {
                    if (isPreOrder) {
                        container.innerHTML = `<div class="status-badge pending-preorder">📅 Order Confirmed</div>`;
                        msgBox.innerText = "Your pre-order is logged in our system. We will see you at the truck for collection!";
                    } else {
                        container.innerHTML = `<div class="status-badge pending-pickup">👨‍🍳 Cooking Now</div>`;
                        msgBox.innerText = "Our team is preparing your fresh order. It won't be long now!";
                    }
                } else if (status === 'ready') {
                    container.innerHTML = `<div class="status-badge ready">✅ Ready for Collection!</div>`;
                    msgBox.innerHTML = "<strong style='color:#2ecc71'>Your order is ready!</strong> Please head to the truck and show this screen.";
                    
                    // Trigger haptic feedback for mobile devices
                    if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                }
            });
        } else {
            document.getElementById('order-id').innerText = "ERROR: NO ID";
        }
    </script>
</body>
</html>
