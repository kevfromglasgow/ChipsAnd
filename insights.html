<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --border: rgba(255,255,255,0.1); --green: #2ecc71; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: var(--surface); border-radius: 16px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1f1f1f; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--orange); margin: 10px 0; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        select { background: #000; color: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--orange); width: 100%; max-width: 300px; font-family: inherit; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #888; font-size: 0.8rem; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid var(--border); }
        .back-link { color: var(--orange); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <a href="index.html" class="back-link">← Back to Dashboard</a>
                <h1 style="margin: 10px 0 0 0;">Business Insights</h1>
            </div>
            <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" style="height:40px;">
        </div>

        <div class="card">
            <label style="display:block; margin-bottom:10px; font-size:0.9rem;">Select Collection Batch:</label>
            <select id="date-picker"><option>Loading dates...</option></select>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Revenue</div>
                    <div id="stat-rev" class="stat-val">£0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Pies Sold</div>
                    <div id="stat-qty" class="stat-val">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Orders Count</div>
                    <div id="stat-orders" class="stat-val">0</div>
                </div>
            </div>

            <h3>Sales Breakdown</h3>
            <table>
                <thead>
                    <tr><th>Flavor</th><th style="text-align:center;">Quantity</th><th style="text-align:right;">Subtotal</th></tr>
                </thead>
                <tbody id="flavor-rows"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, collection, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Dates
        const dateSnap = await getDoc(doc(db, "settings", "collection_dates"));
        const picker = document.getElementById('date-picker');
        picker.innerHTML = '<option value="">Choose a date...</option>';
        dateSnap.data().dates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.label; opt.innerText = d.label;
            picker.appendChild(opt);
        });

        picker.onchange = async (e) => {
            const dateLabel = e.target.value;
            if(!dateLabel) return;

            const q = query(collection(db, "orders"), where("collectionDate", "==", dateLabel), where("paymentStatus", "==", "PAID"));
            const snap = await getDocs(q);
            
            let revenue = 0; let qty = 0; let flavors = {};

            snap.forEach(d => {
                const data = d.data();
                data.items.forEach(item => {
                    revenue += item.price;
                    qty++;
                    flavors[item.name] = (flavors[item.name] || 0) + 1;
                });
            });

            document.getElementById('stat-rev').innerText = `£${revenue.toFixed(2)}`;
            document.getElementById('stat-qty').innerText = qty;
            document.getElementById('stat-orders').innerText = snap.size;

            const tbody = document.getElementById('flavor-rows');
            tbody.innerHTML = "";
            Object.entries(flavors).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
                tbody.innerHTML += `<tr><td>${name}</td><td style="text-align:center; font-weight:bold;">${count}</td><td style="text-align:right; color:var(--green);">£${(count * (revenue/qty)).toFixed(2)}*</td></tr>`;
            });
        };
    </script>
</body>
</html>
