<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo-header { height: 45px; width: auto; cursor: pointer; }

        /* ── LANDING ── */
        #landing-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .logo-main { width: 220px; height: auto; margin-bottom: 10px; }
        .choice-btn {
            width: 85%; max-width: 320px; padding: 20px;
            border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: white; cursor: pointer;
            font-family: 'Playfair Display'; font-size: 1.2rem;
            transition: 0.2s; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .choice-btn:hover:not(:disabled) { border-color: var(--orange); }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .choice-sub { font-family: 'DM Sans'; font-size: 0.75rem; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }

        /* ── MENU ── */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .cat-title { color: var(--orange); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px; }
        .item-card { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid var(--border); gap: 12px; }
        .item-info { flex: 1; }
        .item-desc { font-size: 0.8rem; color: #888; margin-top: 3px; }
        .item-sub-hint { font-size: 0.78rem; color: #666; margin-top: 3px; font-style: italic; }
        .add-btn { background: var(--orange); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }

        /* ── CART BAR ── */
        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #1f1f1f; padding: 20px; border-radius: 20px; border: 1px solid var(--orange); display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { outline: none; border-color: var(--orange); }
        .confirm-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; font-family: 'DM Sans', sans-serif; }
        .confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #cart-items { max-height: 120px; overflow-y: auto; margin-bottom: 15px; font-size: 0.88rem; border-top: 1px solid #333; padding-top: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 8px; }
        .cart-row-name { flex: 1; font-size: 0.85rem; }
        .cart-row-sub { font-size: 0.75rem; color: var(--orange); }
        .cart-qty-row { display: flex; align-items: center; gap: 6px; }
        .qty-btn { background: #2a2a2a; border: 1px solid #444; color: white; width: 24px; height: 24px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
        .rm-btn  { background: none; border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; width: 24px; height: 24px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }

        /* ── VARIANT / OPTION MODAL ── */
        #opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000; display: flex; align-items: flex-end; justify-content: center; }
        .opt-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 480px; animation: slideUp 0.22s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .opt-sheet h3 { font-family: 'Playfair Display'; font-size: 1.1rem; margin-bottom: 6px; }
        .opt-sheet p  { font-size: 0.85rem; color: #888; margin-bottom: 16px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .opt-btn {
            padding: 13px 10px; border-radius: 10px; border: 1.5px solid var(--border);
            background: #1f1f1f; color: var(--text); cursor: pointer;
            font-family: 'DM Sans'; font-size: 0.88rem; text-align: center; transition: 0.15s;
        }
        .opt-btn:hover { border-color: var(--orange); background: rgba(244,113,43,0.1); }
        .opt-cancel { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'DM Sans'; font-size: 0.88rem; }

        .admin-tag { border: 1px dashed var(--orange) !important; opacity: 0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="landing-screen">
    <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-main">
    <button id="pie-btn" class="choice-btn hidden">
        Pre-Order Pies
        <span class="choice-sub" id="pie-sub">Weekly Batch</span>
    </button>
    <button id="menu-btn" class="choice-btn hidden">
        Order Food
        <span class="choice-sub">Collection Only</span>
    </button>
</div>

<header>
    <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-header" onclick="window.location.reload()">
</header>

<div id="main-content" class="hidden">
    <div class="container" id="menu-display"></div>
</div>

<div id="cart-bar">
    <input type="text" id="cust-name" placeholder="Full Name *" required>
    <input type="tel"  id="cust-phone" placeholder="Phone Number">
    <textarea id="cust-note" placeholder="Special requests or allergies..."></textarea>
    <div id="cart-items"></div>
    <button class="confirm-btn" id="submit-order-btn">Pay & Confirm Order</button>
</div>

<!-- Option / variant picker modal -->
<div id="opt-modal" class="hidden">
    <div class="opt-sheet">
        <h3 id="opt-modal-title"></h3>
        <p  id="opt-modal-sub"></p>
        <div class="opt-grid" id="opt-modal-grid"></div>
        <button class="opt-cancel" id="opt-modal-cancel">Cancel</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// cart entries: { name, price, qty, variantLabel (opt), subOption (opt) }
let cart        = {};
let currentMode = '';
let catOrder    = [];

const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

// ── SETTINGS ──────────────────────────────────────────────────────────────────
onSnapshot(doc(db, "settings", "truck_status"), s => {
    const d = s.data() || {};
    const pBtn = document.getElementById('pie-btn');
    const mBtn = document.getElementById('menu-btn');

    // Menu button
    if (d.is_closed && !isAdmin) {
        mBtn.disabled = true;
        mBtn.querySelector('.choice-sub').innerText = 'Currently Closed';
    } else {
        mBtn.disabled = false;
        mBtn.querySelector('.choice-sub').innerText = 'Collection Only';
        mBtn.addEventListener('click', () => startFlow('MENU'), { once: true });
    }
    if (isAdmin) {
        mBtn.classList.remove('hidden');
        mBtn.classList.add('admin-tag');
        mBtn.childNodes[0].textContent = 'Order Food (Admin Preview)';
    } else if (!d.is_closed) {
        mBtn.classList.remove('hidden');
    }

    // Pie button
    if (d.pies_enabled && (d.pie_inventory ?? 0) > 0) {
        pBtn.classList.remove('hidden');
        pBtn.disabled = false;
        pBtn.addEventListener('click', () => startFlow('PIES'), { once: true });
    } else if (d.pies_enabled) {
        pBtn.classList.remove('hidden');
        pBtn.disabled = true;
        document.getElementById('pie-sub').innerText = 'Sold Out';
    }
});

// Category order (for display ordering)
onSnapshot(doc(db, "settings", "categories"), snap => {
    catOrder = snap.data()?.list || [];
});

// ── FLOW ──────────────────────────────────────────────────────────────────────
function startFlow(mode) {
    currentMode = mode;
    document.getElementById('landing-screen').style.display = 'none';
    document.getElementById('main-content').classList.remove('hidden');
    loadMenu();
}

// ── MENU ──────────────────────────────────────────────────────────────────────
function loadMenu() {
    onSnapshot(collection(db, "menu"), snap => {
        const display = document.getElementById('menu-display');
        display.innerHTML = "";

        const items = [];
        snap.forEach(d => items.push({ id: d.id, ...d.data() }));
        items.sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99));

        // Use saved category order if available, else derive
        const orderedCats = catOrder.length
            ? [...new Set([...catOrder, ...items.map(i => i.category)])]
            : [...new Set(items.map(i => i.category))];

        orderedCats.forEach(cat => {
            if (currentMode === 'PIES' && cat !== 'PIES') return;
            if (currentMode === 'MENU' && cat === 'PIES') return;

            const catItems = items.filter(i => i.category === cat && i.is_available);
            if (!catItems.length) return;

            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerText = cat;
            display.appendChild(title);

            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';

                const info = document.createElement('div');
                info.className = 'item-info';

                const nameEl = document.createElement('strong');
                nameEl.innerText = item.name;
                info.appendChild(nameEl);

                // Show price differently depending on whether variants exist
                const hasVariants = item.variants && item.variants.length > 0;
                const priceEl = document.createElement('div');
                priceEl.style.fontSize = '0.9rem';
                priceEl.style.color = 'var(--orange)';
                if (hasVariants) {
                    priceEl.innerText = item.variants.map(v => v.label + ' £' + parseFloat(v.price).toFixed(2)).join(' / ');
                } else {
                    priceEl.innerText = '£' + parseFloat(item.price).toFixed(2);
                }
                info.appendChild(priceEl);

                // Sub-option hint
                if (item.subOptions && item.subOptions.length) {
                    const hint = document.createElement('div');
                    hint.className = 'item-sub-hint';
                    hint.innerText = 'Choice of: ' + item.subOptions.join(' or ');
                    info.appendChild(hint);
                }

                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.innerText = '+';
                addBtn.addEventListener('click', () => handleAdd(item));

                card.appendChild(info);
                card.appendChild(addBtn);
                display.appendChild(card);
            });
        });
    });
}

// ── ADDING TO CART ────────────────────────────────────────────────────────────
// Priority: if item has variants → show variant picker (priced)
//           else if item has subOptions → show free-choice picker
//           else → add directly

function handleAdd(item) {
    const hasVariants    = item.variants    && item.variants.length > 0;
    const hasSubOptions  = item.subOptions  && item.subOptions.length > 0;

    if (hasVariants) {
        showModal(item.name, 'Choose a size / quantity:', item.variants.map(v => ({
            label: v.label + ' — £' + parseFloat(v.price).toFixed(2),
            onSelect: () => addToCart(item.name, v.price, v.label, null)
        })));
    } else if (hasSubOptions) {
        showModal(item.name, 'Choose one:', item.subOptions.map(opt => ({
            label: opt,
            onSelect: () => addToCart(item.name, item.price, null, opt)
        })));
    } else {
        addToCart(item.name, item.price, null, null);
    }
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(title, sub, choices) {
    document.getElementById('opt-modal-title').innerText = title;
    document.getElementById('opt-modal-sub').innerText   = sub;
    const grid = document.getElementById('opt-modal-grid');
    grid.innerHTML = "";
    choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = c.label;
        btn.addEventListener('click', () => { c.onSelect(); closeModal(); });
        grid.appendChild(btn);
    });
    document.getElementById('opt-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('opt-modal').classList.add('hidden'); }
document.getElementById('opt-modal-cancel').addEventListener('click', closeModal);
document.getElementById('opt-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── CART ──────────────────────────────────────────────────────────────────────
function cartKey(name, variantLabel, subOption) {
    return name + (variantLabel ? '|v:' + variantLabel : '') + (subOption ? '|s:' + subOption : '');
}

function addToCart(name, price, variantLabel, subOption) {
    const key = cartKey(name, variantLabel, subOption);
    if (!cart[key]) cart[key] = { name, price, qty: 1, variantLabel, subOption };
    else cart[key].qty++;
    updateUI();
}

function updateUI() {
    const bar      = document.getElementById('cart-bar');
    const itemsDiv = document.getElementById('cart-items');
    itemsDiv.innerHTML = "";

    const keys = Object.keys(cart);
    keys.forEach(key => {
        const entry = cart[key];
        const row   = document.createElement('div');
        row.className = 'cart-row';

        const nameWrap = document.createElement('div');
        nameWrap.className = 'cart-row-name';
        nameWrap.innerText = entry.name;
        if (entry.variantLabel || entry.subOption) {
            const sub = document.createElement('div');
            sub.className = 'cart-row-sub';
            sub.innerText = entry.variantLabel || entry.subOption;
            nameWrap.appendChild(sub);
        }

        const qtyRow = document.createElement('div');
        qtyRow.className = 'cart-qty-row';

        const minus = document.createElement('button');
        minus.className = 'qty-btn';
        minus.innerText = '−';
        minus.addEventListener('click', () => { cart[key].qty--; if (cart[key].qty <= 0) delete cart[key]; updateUI(); });

        const qtySpan = document.createElement('span');
        qtySpan.innerText = entry.qty;
        qtySpan.style.minWidth = '18px';
        qtySpan.style.textAlign = 'center';

        const plus = document.createElement('button');
        plus.className = 'qty-btn';
        plus.innerText = '+';
        plus.addEventListener('click', () => { cart[key].qty++; updateUI(); });

        const rm = document.createElement('button');
        rm.className = 'rm-btn';
        rm.innerText = '×';
        rm.addEventListener('click', () => { delete cart[key]; updateUI(); });

        qtyRow.appendChild(minus);
        qtyRow.appendChild(qtySpan);
        qtyRow.appendChild(plus);
        qtyRow.appendChild(rm);

        row.appendChild(nameWrap);
        row.appendChild(qtyRow);
        itemsDiv.appendChild(row);
    });

    bar.style.display = keys.length > 0 ? 'block' : 'none';
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
document.getElementById('submit-order-btn').addEventListener('click', async () => {
    const name = document.getElementById('cust-name').value.trim();
    if (!name) return alert("Please enter your name.");

    const keys = Object.keys(cart);
    if (!keys.length) return alert("Your cart is empty.");

    const btn = document.getElementById('submit-order-btn');
    btn.disabled = true;
    btn.innerText = "Securing Payment...";

    const items = [];
    let total = 0;
    keys.forEach(key => {
        const e = cart[key];
        for (let i = 0; i < e.qty; i++) {
            items.push({
                name:        e.name,
                price:       e.price,
                variantLabel: e.variantLabel || null,
                subOption:   e.subOption    || null
            });
            total += e.price;
        }
    });

    try {
        const docRef = await addDoc(collection(db, "orders"), {
            items,
            customer: {
                name,
                phone: document.getElementById('cust-phone').value,
                msg:   document.getElementById('cust-note').value
            },
            paymentStatus: 'UNPAID',
            status: 'pending',
            type: currentMode === 'PIES' ? 'PRE-ORDER' : 'PICKUP',
            createdAt: serverTimestamp()
        });

        const response = await fetch('https://us-central1-chipsand-13831.cloudfunctions.net/createCheckout', {
            method: 'POST', mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { orderId: docRef.id, amount: Math.round(total * 100) } })
        });
        const result = await response.json();
        if (result.data?.url) window.location.href = result.data.url;
        else throw new Error('No URL returned');
    } catch (e) {
        console.error(e);
        alert("Payment error. Try again.");
        btn.disabled = false;
        btn.innerText = "Pay & Confirm Order";
    }
});
</script>
</body>
</html>
