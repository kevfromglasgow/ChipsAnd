<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Menu</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --brand-orange: #e67e22; --brand-dark: #1a1a1a; --brand-grey: #333333; --text-main: #ffffff; }
        body { font-family: -apple-system, sans-serif; padding: 0; margin: 0; background: var(--brand-grey); color: var(--text-main); padding-bottom: 220px; }
        header { background: var(--brand-dark); padding: 20px; text-align: center; border-bottom: 4px solid var(--brand-orange); }
        .logo { max-width: 140px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Menu Grid */
        .category-section { margin-bottom: 30px; }
        .category-title { color: var(--brand-orange); text-transform: uppercase; border-bottom: 2px solid var(--brand-orange); padding-bottom: 5px; margin-bottom: 15px; font-weight: bold; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .item-card { background: var(--brand-dark); border: 1px solid #444; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--brand-orange); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Advanced Cart Bar */
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: #222; border-top: 4px solid var(--brand-orange); display: none; box-sizing: border-box; z-index: 1000; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .cart-items-list { max-height: 150px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9rem; }
        
        /* Quantity Controls */
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #333; border-radius: 5px; padding: 5px 10px; }
        .qty-btn { background: var(--brand-orange); border: none; color: white; width: 25px; height: 25px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        
        .total-display { font-size: 1.3rem; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .checkout-group { display: flex; gap: 10px; }
        .pay-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .sold-out { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        #closed-screen { display: none; text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>
    <header><img src="ChipsAndLogo.jpg" alt="ChipsAnd Logo" class="logo"></header>
    <div id="active-menu" class="container"><div id="menu-display">Loading ChipsAnd...</div></div>
    <div id="closed-screen"><h2>Truck is currently closed!</h2></div>

    <div id="cart-bar">
        <div id="cart-items" class="cart-items-list"></div>
        <div class="total-display">Total: £<span id="total-price">0.00</span></div>
        <div class="checkout-group">
            <button class="pay-btn" style="background: #27ae60; color: white;" onclick="startCheckout()">Card</button>
            <button class="pay-btn" style="background: var(--brand-orange); color: white;" onclick="payOnCollection()">Pay at Truck</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {}; // Using an object to track quantities by name

        onSnapshot(doc(db, "settings", "truck_status"), (docSnap) => {
            const isClosed = docSnap.data()?.is_closed;
            document.getElementById('active-menu').style.display = isClosed ? 'none' : 'block';
            document.getElementById('closed-screen').style.display = isClosed ? 'block' : 'none';
        });

        onSnapshot(collection(db, "menu"), (snapshot) => {
            const display = document.getElementById('menu-display');
            display.innerHTML = "";
            const categories = {};
            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                const cat = item.category || "GENERAL";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ id: docSnap.id, ...item });
            });
            ["CHIPS", "TOASTIES", "PASTA POTS", "SIDES", "DRINKS"].forEach(catName => {
                if (categories[catName]) {
                    const section = document.createElement('div');
                    section.className = 'category-section';
                    section.innerHTML = `<div class="category-title">${catName}</div><div class="items-grid" id="grid-${catName}"></div>`;
                    display.appendChild(section);
                    categories[catName].forEach(item => {
                        const div = document.createElement('div');
                        div.className = `item-card ${item.is_available ? '' : 'sold-out'}`;
                        div.innerHTML = `<div><strong>${item.name}</strong><br>£${item.price.toFixed(2)}</div>
                            <button class="add-btn" onclick="updateCart('${item.name}', ${item.price}, 1)">ADD</button>`;
                        document.getElementById(`grid-${catName}`).appendChild(div);
                    });
                }
            });
        });

        window.updateCart = (name, price, change) => {
            if (!cart[name]) {
                if (change > 0) cart[name] = { price, qty: 1 };
            } else {
                cart[name].qty += change;
                if (cart[name].qty <= 0) delete cart[name];
            }
            renderCart();
        };

        function renderCart() {
            const list = document.getElementById('cart-items');
            const bar = document.getElementById('cart-bar');
            list.innerHTML = "";
            let total = 0;
            let count = 0;

            for (const name in cart) {
                const item = cart[name];
                total += item.price * item.qty;
                count += item.qty;
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <span>${name}</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateCart('${name}', ${item.price}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="updateCart('${name}', ${item.price}, 1)">+</button>
                    </div>
                `;
                list.appendChild(row);
            }

            document.getElementById('total-price').innerText = total.toFixed(2);
            bar.style.display = count > 0 ? 'block' : 'none';
        }

        window.payOnCollection = async () => {
            const orderItems = [];
            for (const name in cart) {
                for (let i = 0; i < cart[name].qty; i++) {
                    orderItems.push({ name, price: cart[name].price });
                }
            }
            const docRef = await addDoc(collection(db, "orders"), { items: orderItems, status: "pending", type: "Pickup", note: "", createdAt: serverTimestamp() });
            window.location.href = `track.html?id=${docRef.id}`;
        };
    </script>
</body>
</html>
