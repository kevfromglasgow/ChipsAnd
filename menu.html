<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Dundee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #F4712B;
            --bg: #0E0E0E;
            --surface: #161616;
            --surface-2: #1F1F1F;
            --border: rgba(255,255,255,0.07);
            --text: #F0EDE8;
            --muted: #888;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* ── LANDING SELECTION ───────────────────── */
        #landing-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            padding: 40px; text-align: center;
        }
        .choice-btn {
            width: 100%; max-width: 300px; padding: 24px; border-radius: 16px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text); font-family: 'Playfair Display', serif; font-size: 1.4rem;
            cursor: pointer; transition: 0.3s;
        }
        .choice-btn:hover { border-color: var(--orange); background: var(--surface-2); transform: translateY(-3px); }
        .choice-btn span { display: block; font-family: 'DM Sans'; font-size: 0.8rem; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* ── PRE-ORDER FORM ─────────────────────── */
        #preorder-fields { display: none; margin-top: 20px; padding: 20px; background: var(--surface); border-radius: 16px; border: 1px solid var(--orange); }
        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; 
            border: 1px solid var(--border); background: var(--bg); color: white; font-family: 'DM Sans';
        }

        /* ── EXISTING STYLES RE-APPLIED ───────────── */
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); sticky; top: 0; background: rgba(14,14,14,0.9); backdrop-filter: blur(10px); z-index: 900; }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; }
        .brand-name span { color: var(--orange); }
        .cat-nav { display: flex; padding: 0 40px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .cat-pill { background: none; border: none; color: var(--muted); padding: 18px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .cat-pill.active { color: var(--orange); border-bottom: 2px solid var(--orange); }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .item-card { background: var(--surface); border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .add-btn { background: none; border: 1.5px solid var(--orange); color: var(--orange); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }
        
        #cart-bar { 
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); 
            width: calc(100% - 40px); max-width: 500px; background: rgba(22,22,22,0.95); 
            border: 1px solid var(--orange); border-radius: 20px; padding: 20px; 
            display: none; z-index: 1000; backdrop-filter: blur(10px);
        }
        .confirm-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- CHOICE SCREEN -->
    <div id="landing-screen">
        <div class="brand-name" style="margin-bottom: 20px;">Chips<span>&</span></div>
        <button class="choice-btn" onclick="startFlow('PIES')">Pre-Order Pies<span>Weekly Batch • Limited Stock</span></button>
        <button class="choice-btn" onclick="startFlow('MENU')">Order From Menu<span>Live Kitchen • Collection Only</span></button>
    </div>

    <header>
        <div class="brand-name" onclick="location.reload()" style="cursor:pointer">Chips<span>&</span></div>
        <div id="header-mode" style="font-size: 0.7rem; color: var(--orange); letter-spacing: 2px; text-transform: uppercase;"></div>
    </header>

    <div id="main-content" class="hidden">
        <nav class="cat-nav" id="cat-tabs"></nav>
        <div class="container">
            <div id="menu-display"></div>
        </div>
    </div>

    <!-- CART / ORDER BAR -->
    <div id="cart-bar">
        <div id="preorder-fields">
            <input type="text" id="cust-name" placeholder="Your Full Name *" required>
            <input type="tel" id="cust-phone" placeholder="Phone Number *" required>
            <textarea id="cust-note" placeholder="Message to truck (Optional)"></textarea>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: baseline;">
            <span style="color: var(--muted); font-size: 0.8rem;">Total Amount:</span>
            <span style="font-size: 1.5rem; font-family: 'Playfair Display'; font-weight: 900;">£<span id="total-price">0.00</span></span>
        </div>
        <button class="confirm-btn" id="main-action-btn" onclick="submitOrder()">Confirm Order</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {};
        let currentMode = ''; // 'PIES' or 'MENU'

        window.startFlow = (mode) => {
            currentMode = mode;
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('header-mode').innerText = mode === 'PIES' ? 'Pre-Order Mode' : 'Live Menu Mode';
            
            if(mode === 'PIES') {
                document.getElementById('preorder-fields').style.display = 'block';
            }
            loadMenu();
        };

        window.addToCart = (name, price) => {
            if (!cart[name]) cart[name] = { price, qty: 1 };
            else cart[name].qty += 1;
            updateUI();
        };

        function updateUI() {
            let total = 0, count = 0;
            for (const id in cart) { total += cart[id].price * cart[id].qty; count += cart[id].qty; }
            document.getElementById('total-price').innerText = total.toFixed(2);
            document.getElementById('cart-bar').style.display = count > 0 ? 'block' : 'none';
        }

        window.submitOrder = async () => {
            if (currentMode === 'PIES') {
                const name = document.getElementById('cust-name').value;
                const phone = document.getElementById('cust-phone').value;
                if (!name || !phone) return alert("Please provide Name and Phone");
            }

            const itemsArray = [];
            for (const name in cart) {
                for(let i=0; i<cart[name].qty; i++) itemsArray.push({ name, price: cart[name].price });
            }

            const orderData = {
                items: itemsArray,
                status: "pending",
                type: currentMode === 'PIES' ? "PRE-ORDER" : "PICKUP",
                customer: currentMode === 'PIES' ? { 
                    name: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    msg: document.getElementById('cust-note').value
                } : null,
                createdAt: serverTimestamp()
            };

            const docRef = await addDoc(collection(db, "orders"), orderData);
            window.location.href = `track.html?id=${docRef.id}`;
        };

        function loadMenu() {
            onSnapshot(collection(db, "menu"), (snapshot) => {
                const display = document.getElementById('menu-display');
                const tabs = document.getElementById('cat-tabs');
                display.innerHTML = ""; tabs.innerHTML = "";

                const categories = {};
                snapshot.forEach(docSnap => {
                    const item = docSnap.data();
                    const cat = item.category || "GENERAL";
                    // Logic: If PIES mode, only show PIES. If MENU mode, show everything EXCEPT PIES.
                    if (currentMode === 'PIES' && cat !== 'PIES') return;
                    if (currentMode === 'MENU' && cat === 'PIES') return;

                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push({ id: docSnap.id, ...item });
                });

                Object.keys(categories).forEach(catName => {
                    const section = document.createElement('div');
                    section.id = `section-${catName}`;
                    section.innerHTML = `<h2 style="font-family:'Playfair Display'; margin: 30px 0 15px;">${catName}</h2><div class="items-grid" id="grid-${catName}"></div>`;
                    display.appendChild(section);

                    categories[catName].forEach(item => {
                        const card = document.createElement('div');
                        card.className = `item-card ${item.is_available ? '' : 'sold-out'}`;
                        card.innerHTML = `<div><div style="font-weight:500;">${item.name}</div><div style="color:var(--orange);">£${item.price.toFixed(2)}</div></div>
                            <button class="add-btn" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price})">+</button>`;
                        document.getElementById(`grid-${catName}`).appendChild(card);
                    });
                });
            });
        }
    </script>
</body>
</html>
