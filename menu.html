<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo-header { height: 45px; width: auto; cursor: pointer; }
        #landing-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; text-align: center;}
        .logo-main { width: 220px; height: auto; margin-bottom: 10px; }
        .choice-btn { width: 85%; max-width: 320px; padding: 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: white; cursor: pointer; font-family: 'Playfair Display'; font-size: 1.2rem; transition: 0.2s; text-align: center; }
        .choice-btn:hover:not(:disabled) { border-color: var(--orange); }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .cat-title { color: var(--orange); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px; }
        .item-card { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid var(--border); gap: 12px; }
        .item-info { flex: 1; }
        .item-sub-hint { font-size: 0.78rem; color: #888; margin-top: 6px; font-style: italic; line-height: 1.4; }
        .add-btn { background: var(--orange); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; }
        #cart-bar { position: fixed; bottom: 20px; right: 20px; width: 90%; max-width: 450px; background: #1f1f1f; padding: 20px; border-radius: 20px; border: 1px solid var(--orange); display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @media (max-width: 800px) { #cart-bar { left: 50%; right: auto; transform: translateX(-50%); } }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-family: inherit; }
        .confirm-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #cart-items { max-height: 100px; overflow-y: auto; margin-bottom: 15px; font-size: 0.9rem; border-top: 1px solid #333; padding-top: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; gap: 8px; }
        .cart-row-name { flex: 1; font-size: 0.85rem; }
        .cart-row-sub { font-size: 0.75rem; color: var(--orange); }
        .cart-qty-wrap { display: flex; align-items: center; gap: 5px; }
        .qty-btn { background: #2a2a2a; border: 1px solid #444; color: white; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; line-height: 1; }
        .rm-btn  { background: none; border: 1px solid rgba(231,76,60,0.4); color: #e74c3c; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; line-height: 1; }
        #opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .opt-sheet { background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; }
        .opt-sheet h3 { font-family: 'Playfair Display'; font-size: 1.1rem; margin-bottom: 6px; }
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }
        .opt-btn { padding: 14px 10px; border-radius: 10px; border: 1.5px solid var(--border); background: #1f1f1f; color: var(--text); cursor: pointer; font-family: 'DM Sans'; font-size: 0.9rem; text-align: center; }
        .opt-btn:hover { border-color: var(--orange); }
        .opt-cancel { background: none; border: 1px solid #333; color: #666; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'DM Sans'; font-size: 0.88rem; }
        .hidden { display: none !important; }
        .admin-tag { border: 1px dashed var(--orange) !important; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="landing-screen">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-main">
        <div id="landing-buttons">
            <button id="pie-trigger" class="choice-btn">Pre-Order Pies</button>
            <button id="menu-btn" class="choice-btn">Order Food</button>
        </div>
        <div id="date-selection" class="hidden">
            <h3 style="color:var(--orange); font-family:'Playfair Display';">Select Collection Date</h3>
            <div id="date-buttons"></div>
            <button class="choice-btn" style="margin-top:20px; font-size:1rem; padding:10px" onclick="location.reload()">Back</button>
        </div>
    </div>

    <header><img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-header" onclick="location.reload()"></header>
    <div id="main-content" class="hidden"><div class="container" id="menu-display"></div></div>

    <div id="cart-bar">
        <input type="text" id="cust-name" placeholder="Full Name *" required>
        <input type="tel" id="cust-phone" placeholder="Phone Number">
        <textarea id="cust-note" placeholder="Special requests or allergies..."></textarea>
        <div id="cart-items"></div>
        <button class="confirm-btn" id="submit-order-btn">Pay & Confirm Order</button>
    </div>

    <div id="opt-modal" class="hidden">
        <div class="opt-sheet">
            <h3 id="opt-modal-title"></h3>
            <p id="opt-modal-sub" style="font-size: 0.85rem; color: #888; margin-bottom: 15px;"></p>
            <div class="opt-grid" id="opt-modal-grid"></div>
            <button class="opt-cancel" id="opt-modal-cancel">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {}; let currentMode = ''; let collectionDates = []; let selectedDateId = null;
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

        let catOrder = [];
        onSnapshot(doc(db, "settings", "categories"), snap => { catOrder = snap.data()?.list || []; });
        onSnapshot(doc(db, "settings", "collection_dates"), snap => { collectionDates = snap.data()?.dates || []; });

        onSnapshot(doc(db, "settings", "truck_status"), (s) => {
            const d = s.data();
            const mBtn = document.getElementById('menu-btn');
            if (isAdmin) { mBtn.innerText = "Order Food (Admin Preview)"; mBtn.classList.add('admin-tag'); }
            else if (d?.is_closed) { mBtn.disabled = true; mBtn.innerText = 'MENU - COMING SOON'; }
            mBtn.onclick = () => startFlow('MENU');
        });

        document.getElementById('pie-trigger').onclick = () => {
            document.getElementById('landing-buttons').classList.add('hidden');
            const dateDisplay = document.getElementById('date-selection');
            dateDisplay.classList.remove('hidden');
            const dateWrap = document.getElementById('date-buttons'); dateWrap.innerHTML = "";
            const activeDates = collectionDates.filter(d => d.active);
            if(!activeDates.length) { dateWrap.innerHTML = "<p>No dates available.</p>"; return; }
            activeDates.forEach(d => {
                const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.style.marginBottom = "10px";
                const isSoldOut = d.stock <= 0; btn.disabled = isSoldOut;
                btn.innerHTML = `${d.label}<br><span style="font-size:0.7rem; font-family:'DM Sans';">${isSoldOut ? 'SOLD OUT' : 'Pickup: ' + d.times}</span>`;
                btn.onclick = () => { selectedDateId = d.id; startFlow('PIES'); };
                dateWrap.appendChild(btn);
            });
        };

        function startFlow(mode) {
            currentMode = mode; document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden'); loadMenu();
        }

        function addToCart(n, p, v, s) {
            const k = n + (v?'|v:'+v:'') + (s?'|s:'+s:'');
            if(!cart[k]) cart[k] = { name:n, price:p, qty:1, variantLabel:v||null, subOption:s||null };
            else cart[k].qty++; updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('cart-bar'); const itemsDiv = document.getElementById('cart-items'); itemsDiv.innerHTML = "";
            Object.keys(cart).forEach(k => {
                const e = cart[k]; const row = document.createElement('div'); row.className = 'cart-row';
                row.innerHTML = `<div class='cart-row-name'>${e.name}${e.variantLabel||e.subOption ? `<div class='cart-row-sub'>${e.variantLabel||e.subOption}</div>`:''}</div>
                                 <div class='cart-qty-wrap'><button class='qty-btn' onclick="adjust('${k}',-1)">-</button><span>${e.qty}</span><button class='qty-btn' onclick="adjust('${k}',1)">+</button></div>`;
                itemsDiv.appendChild(row);
            });
            bar.style.display = Object.keys(cart).length > 0 ? 'block' : 'none';
        }
        window.adjust = (k, d) => { cart[k].qty += d; if(cart[k].qty <=0) delete cart[k]; updateUI(); };

        function showModal(title, sub, choices) {
            document.getElementById('opt-modal-title').innerText = title; 
            document.getElementById('opt-modal-sub').innerText = sub;
            const grid = document.getElementById('opt-modal-grid'); 
            grid.innerHTML = "";
            choices.forEach(c => { 
                const b = document.createElement('button'); 
                b.className = 'opt-btn'; 
                b.innerText = c.label; 
                b.onclick = () => { c.onSelect(); document.getElementById('opt-modal').classList.add('hidden'); }; 
                grid.appendChild(b); 
            });
            document.getElementById('opt-modal').classList.remove('hidden');
        }
        document.getElementById('opt-modal-cancel').onclick = () => document.getElementById('opt-modal').classList.add('hidden');

        document.getElementById('submit-order-btn').onclick = async () => {
            const name = document.getElementById('cust-name').value; if(!name) return alert("Enter Name");
            const btn = document.getElementById('submit-order-btn'); btn.disabled = true; btn.innerText = "Securing Payment...";
            const items = []; let total = 0; let piesInCart = 0;
            Object.values(cart).forEach(e => { if(e.name.toLowerCase().includes('pie')) piesInCart += e.qty; for(let i=0;i<e.qty;i++){ items.push({name:e.name, price:e.price, variantLabel:e.variantLabel, subOption:e.subOption}); total += e.price; } });
            
            try {
                if(currentMode === 'PIES' && piesInCart > 0) {
                    const dateRef = doc(db, "settings", "collection_dates"); const dateSnap = await getDoc(dateRef);
                    let dates = dateSnap.data().dates; let idx = dates.findIndex(d => d.id === selectedDateId);
                    if(dates[idx].stock < piesInCart) { alert("Stock low for this date."); btn.disabled=false; return; }
                    dates[idx].stock -= piesInCart; await updateDoc(dateRef, { dates: dates });
                }
                const docRef = await addDoc(collection(db, "orders"), {
                    items, customer: { name, phone: document.getElementById('cust-phone').value, msg: document.getElementById('cust-note').value },
                    collectionDate: currentMode === 'PIES' ? collectionDates.find(d => d.id === selectedDateId).label : 'ASAP',
                    paymentStatus: 'UNPAID', status: 'pending', type: currentMode === 'PIES' ? 'PRE-ORDER' : 'PICKUP', createdAt: serverTimestamp()
                });
                const response = await fetch('https://us-central1-chipsand-13831.cloudfunctions.net/createCheckout', { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: { orderId: docRef.id, amount: Math.round(total * 100) } }) });
                const result = await response.json(); if (result.data?.url) window.location.href = result.data.url;
            } catch (e) { alert("Error"); btn.disabled = false; }
        };

        function loadMenu() {
            onSnapshot(collection(db, "menu"), (snap) => {
                const display = document.getElementById('menu-display'); display.innerHTML = "";
                const items = []; snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                items.sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99));
                const orderedCats = catOrder.length ? [...new Set([...catOrder, ...items.map(i => i.category)])] : [...new Set(items.map(i => i.category))];
                orderedCats.forEach(cat => {
                    const catItems = items.filter(i => i.category === cat && i.is_available);
                    if ((currentMode === 'PIES' && cat !== 'PIES') || (currentMode === 'MENU' && cat === 'PIES')) return;
                    if (!catItems.length) return;
                    display.innerHTML += `<div class="cat-title">${cat}</div>`;
                    catItems.forEach(item => {
                        const card = document.createElement('div'); card.className = 'item-card';
                        const hasV = item.variants?.length > 0; 
                        const hasS = item.subOptions?.length > 0;
                        
                        const info = document.createElement('div');
                        info.className = 'item-info';
                        
                        const priceText = hasV ? item.variants.map(v => v.label + ' £' + parseFloat(v.price).toFixed(2)).join(' / ') : '£' + parseFloat(item.price).toFixed(2);
                        
                        info.innerHTML = `<strong>${item.name}</strong><div style='color:var(--orange); font-size: 0.9rem; margin-top: 2px;'>${priceText}</div>`;
                        
                        if (hasS) {
                            info.innerHTML += `<div class='item-sub-hint'>Must choose: ${item.subOptions.join(' or ')}</div>`;
                        }

                        const b = document.createElement('button'); b.className = 'add-btn'; b.innerText = '+';
                        b.onclick = () => {
                            if (hasV) {
                                showModal(item.name, 'Choose Size:', item.variants.map(v => ({
                                    label: v.label + ' — £' + parseFloat(v.price).toFixed(2),
                                    onSelect: () => {
                                        if (hasS) {
                                            showModal(item.name, 'Choose Side:', item.subOptions.map(opt => ({
                                                label: opt,
                                                onSelect: () => addToCart(item.name, v.price, v.label, opt)
                                            })));
                                        } else {
                                            addToCart(item.name, v.price, v.label, null);
                                        }
                                    }
                                })));
                            } else if (hasS) {
                                showModal(item.name, 'Choose Side:', item.subOptions.map(opt => ({
                                    label: opt,
                                    onSelect: () => addToCart(item.name, item.price, null, opt)
                                })));
                            } else {
                                addToCart(item.name, item.price, null, null);
                            }
                        };
                        card.appendChild(info); card.appendChild(b); display.appendChild(card);
                    });
                });
            });
        }
    </script>
</body>
</html>
