<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Playfair Display'; font-size: 1.5rem; font-weight: 900; }
        .brand span { color: var(--orange); }
        
        #landing-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .choice-btn { width: 80%; max-width: 300px; padding: 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: white; cursor: pointer; font-family: 'Playfair Display'; font-size: 1.2rem; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .item-card { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .add-btn { background: var(--orange); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        
        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #1f1f1f; padding: 20px; border-radius: 20px; border: 1px solid var(--orange); display: none; z-index: 1000; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .confirm-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="landing-screen">
        <div class="brand">Chips<span>&</span></div>
        <button id="pie-btn" class="choice-btn hidden">Pre-Order Pies</button>
        <button onclick="startFlow('MENU')" class="choice-btn">Order Food</button>
    </div>

    <header>
        <div class="brand">Chips<span>&</span></div>
    </header>

    <div id="main-content" class="hidden">
        <div class="container" id="menu-display"></div>
    </div>

    <div id="cart-bar">
        <input type="text" id="cust-name" placeholder="Full Name *" required>
        <input type="tel" id="cust-phone" placeholder="Phone Number">
        <textarea id="cust-note" placeholder="Special requests..."></textarea>
        <div id="cart-items" style="max-height: 100px; overflow-y: auto; margin-bottom: 10px; font-size: 0.9rem;"></div>
        <button class="confirm-btn" id="submit-order-btn">Pay & Confirm Order</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {}; let currentMode = '';

        onSnapshot(doc(db, "settings", "truck_status"), (s) => {
            const d = s.data();
            const pBtn = document.getElementById('pie-btn');
            if(d?.pies_enabled) pBtn.classList.remove('hidden'); 
            pBtn.onclick = () => startFlow('PIES');
        });

        window.startFlow = (mode) => {
            currentMode = mode;
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            loadMenu();
        };

        window.addToCart = (name, price) => {
            if (!cart[name]) cart[name] = { price, qty: 1 };
            else cart[name].qty++;
            updateUI();
        };

        function updateUI() {
            const bar = document.getElementById('cart-bar');
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = Object.keys(cart).map(k => `<div>${k} x${cart[k].qty}</div>`).join('');
            bar.style.display = Object.keys(cart).length > 0 ? 'block' : 'none';
        }

        document.getElementById('submit-order-btn').onclick = async () => {
            const name = document.getElementById('cust-name').value;
            if(!name) return alert("Name required");
            
            const btn = document.getElementById('submit-order-btn');
            btn.disabled = true; btn.innerText = "Connecting...";

            const items = []; let total = 0;
            for(let n in cart) { 
                for(let i=0; i<cart[n].qty; i++) {
                    items.push({name: n, price: cart[n].price});
                    total += cart[n].price;
                }
            }

            try {
                // 1. Create order
                const docRef = await addDoc(collection(db, "orders"), {
                    items, customer: { name, phone: document.getElementById('cust-phone').value },
                    paymentStatus: 'UNPAID', type: currentMode === 'PIES' ? 'PRE-ORDER' : 'PICKUP',
                    createdAt: serverTimestamp()
                });

                // 2. Fetch Stripe URL from Function
                // REPLACE URL BELOW WITH YOUR ACTUAL FUNCTION URL
                const response = await fetch('https://us-central1-chipsand-13831.cloudfunctions.net/createCheckout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { orderId: docRef.id, amount: Math.round(total * 100) } })
                });

                const result = await response.json();
                if (result.data?.url) {
                    window.location.href = result.data.url;
                } else {
                    throw new Error("No URL returned");
                }
            } catch (e) {
                console.error(e);
                alert("Checkout failed. Check console.");
                btn.disabled = false;
            }
        };

        function loadMenu() {
            onSnapshot(collection(db, "menu"), (snap) => {
                const display = document.getElementById('menu-display'); display.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data();
                    if((currentMode === 'PIES' && item.category !== 'PIES') || (currentMode === 'MENU' && item.category === 'PIES')) return;
                    const card = document.createElement('div'); card.className = 'item-card';
                    card.innerHTML = `<div><strong>${item.name}</strong><br>£${item.price.toFixed(2)}</div>
                                     <button class="add-btn" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price})">+</button>`;
                    display.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
