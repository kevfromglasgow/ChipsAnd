<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipsAnd | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #F4712B; --bg: #0E0E0E; --surface: #161616; --text: #F0EDE8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: center; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo-header { height: 45px; width: auto; cursor: pointer; }
        #landing-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .logo-main { width: 220px; height: auto; margin-bottom: 10px; }
        .choice-btn { width: 85%; max-width: 320px; padding: 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: white; cursor: pointer; font-family: 'Playfair Display'; font-size: 1.2rem; transition: 0.2s; text-align: center; }
        .choice-btn:hover:not(:disabled) { border-color: var(--orange); }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .cat-title { color: var(--orange); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px; }
        .item-card { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid var(--border); gap: 12px; }
        .item-info { flex: 1; }
        .item-sub-hint { font-size: 0.78rem; color: #666; margin-top: 4px; font-style: italic; }
        .add-btn { background: var(--orange); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; }
        /* Cart bar — fixed, centred, always on top */
        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #1f1f1f; padding: 20px; border-radius: 20px; border: 1px solid var(--orange); display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-family: inherit; }
        .confirm-btn { background: var(--orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #cart-items { max-height: 100px; overflow-y: auto; margin-bottom: 15px; font-size: 0.9rem; border-top: 1px solid #333; padding-top: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; gap: 8px; }
        .cart-row-name { flex: 1; font-size: 0.85rem; }
        .cart-row-sub { font-size: 0.75rem; color: var(--orange); }
        .cart-qty-wrap { display: flex; align-items: center; gap: 5px; }
        .qty-btn { background: #2a2a2a; border: 1px solid #444; color: white; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; line-height: 1; }
        .rm-btn  { background: none; border: 1px solid rgba(231,76,60,0.4); color: #e74c3c; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; line-height: 1; }
        /* Variant / option modal — fixed, centred overlay */
        #opt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .opt-sheet { background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; }
        .opt-sheet h3 { font-family: 'Playfair Display'; font-size: 1.1rem; margin-bottom: 6px; }
        .opt-sheet p  { font-size: 0.85rem; color: #888; margin-bottom: 16px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .opt-btn { padding: 13px 10px; border-radius: 10px; border: 1.5px solid var(--border); background: #1f1f1f; color: var(--text); cursor: pointer; font-family: 'DM Sans'; font-size: 0.88rem; text-align: center; transition: 0.15s; }
        .opt-btn:hover { border-color: var(--orange); background: rgba(244,113,43,0.1); }
        .opt-cancel { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'DM Sans'; font-size: 0.88rem; }
        .hidden { display: none !important; }
        .admin-tag { border: 1px dashed var(--orange) !important; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="landing-screen">
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-main">
        <!-- Buttons start visible but disabled while Firebase loads — feels instant -->
        <button id="pie-btn" class="choice-btn hidden">Pre-Order Pies</button>
        <button id="menu-btn" class="choice-btn" disabled>Order Food</button>
    </div>

    <header>
        <img src="https://raw.githubusercontent.com/kevfromglasgow/ChipsAnd/main/ChipsAndLogo.png" class="logo-header" onclick="window.location.reload()">
    </header>

    <div id="main-content" class="hidden">
        <div class="container" id="menu-display"></div>
    </div>

    <div id="cart-bar">
        <input type="text" id="cust-name" placeholder="Full Name *" required>
        <input type="tel" id="cust-phone" placeholder="Phone Number">
        <textarea id="cust-note" placeholder="Special requests or allergies..."></textarea>
        <div id="cart-items"></div>
        <button class="confirm-btn" id="submit-order-btn">Pay & Confirm Order</button>
    </div>

    <!-- Variant / option picker — fixed centred modal, not inline -->
    <div id="opt-modal" class="hidden">
        <div class="opt-sheet">
            <h3 id="opt-modal-title"></h3>
            <p  id="opt-modal-sub"></p>
            <div class="opt-grid" id="opt-modal-grid"></div>
            <button class="opt-cancel" id="opt-modal-cancel">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCkNRj4zdboRsE8oF_GGwvqz63gU4V5KG8", authDomain: "chipsand-13831.firebaseapp.com", projectId: "chipsand-13831", storageBucket: "chipsand-13831.firebasestorage.app", messagingSenderId: "105749630976", appId: "1:105749630976:web:038ab2c3ce81612064c8e5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {}; let currentMode = '';
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

        // Category order for correct display sequence
        let catOrder = [];
        onSnapshot(doc(db, "settings", "categories"), snap => { catOrder = snap.data()?.list || []; });

        onSnapshot(doc(db, "settings", "truck_status"), (s) => {
            const d = s.data();
            const pBtn = document.getElementById('pie-btn');
            const mBtn = document.getElementById('menu-btn');

            // Menu button
            if (d?.is_closed && !isAdmin) {
                mBtn.disabled = true;
                mBtn.innerText = 'Currently Closed';
            } else {
                mBtn.disabled = false;
                mBtn.innerText = 'Order Food';
                mBtn.onclick = () => startFlow('MENU');
            }
            if (isAdmin) {
                mBtn.disabled = false;
                mBtn.classList.add('admin-tag');
                mBtn.innerText = "Order Food (Admin Preview)";
                mBtn.onclick = () => startFlow('MENU');
            }

            // Pie button
            if (d?.pies_enabled && (d?.pie_inventory ?? 0) > 0) {
                pBtn.classList.remove('hidden');
                pBtn.disabled = false;
                pBtn.innerText = 'Pre-Order Pies';
                pBtn.onclick = () => startFlow('PIES');
            } else if (d?.pies_enabled) {
                pBtn.classList.remove('hidden');
                pBtn.disabled = true;
                pBtn.innerText = 'Pre-Order Pies (Sold Out)';
            } else {
                pBtn.classList.add('hidden');
            }
        });

        window.startFlow = (mode) => {
            currentMode = mode;
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            loadMenu();
        };

        // ── CART ────────────────────────────────────────────────────────────
        function cartKey(name, variantLabel, subOption) {
            return name + (variantLabel ? '|v:' + variantLabel : '') + (subOption ? '|s:' + subOption : '');
        }

        function addToCart(name, price, variantLabel, subOption) {
            const key = cartKey(name, variantLabel, subOption);
            if (!cart[key]) cart[key] = { name, price, qty: 1, variantLabel: variantLabel || null, subOption: subOption || null };
            else cart[key].qty++;
            updateUI();
        }

        function updateUI() {
            const bar      = document.getElementById('cart-bar');
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = "";
            const keys = Object.keys(cart);
            keys.forEach(key => {
                const e   = cart[key];
                const row = document.createElement('div'); row.className = 'cart-row';

                const nameWrap = document.createElement('div'); nameWrap.className = 'cart-row-name';
                nameWrap.innerText = e.name;
                if (e.variantLabel || e.subOption) {
                    const sub = document.createElement('div'); sub.className = 'cart-row-sub';
                    sub.innerText = e.variantLabel || e.subOption;
                    nameWrap.appendChild(sub);
                }

                const qtyWrap = document.createElement('div'); qtyWrap.className = 'cart-qty-wrap';
                const minus = document.createElement('button'); minus.className = 'qty-btn'; minus.innerText = '−';
                minus.onclick = () => { cart[key].qty--; if (cart[key].qty <= 0) delete cart[key]; updateUI(); };
                const qtySpan = document.createElement('span'); qtySpan.innerText = e.qty; qtySpan.style.cssText = 'min-width:16px;text-align:center;';
                const plus = document.createElement('button'); plus.className = 'qty-btn'; plus.innerText = '+';
                plus.onclick = () => { cart[key].qty++; updateUI(); };
                const rm = document.createElement('button'); rm.className = 'rm-btn'; rm.innerText = '×';
                rm.onclick = () => { delete cart[key]; updateUI(); };
                qtyWrap.appendChild(minus); qtyWrap.appendChild(qtySpan); qtyWrap.appendChild(plus); qtyWrap.appendChild(rm);

                row.appendChild(nameWrap); row.appendChild(qtyWrap);
                itemsDiv.appendChild(row);
            });
            bar.style.display = keys.length > 0 ? 'block' : 'none';
        }

        // ── MODAL ────────────────────────────────────────────────────────────
        function showModal(title, sub, choices) {
            document.getElementById('opt-modal-title').innerText = title;
            document.getElementById('opt-modal-sub').innerText   = sub;
            const grid = document.getElementById('opt-modal-grid'); grid.innerHTML = "";
            choices.forEach(c => {
                const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = c.label;
                btn.addEventListener('click', () => { c.onSelect(); closeModal(); });
                grid.appendChild(btn);
            });
            document.getElementById('opt-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('opt-modal').classList.add('hidden'); }
        document.getElementById('opt-modal-cancel').addEventListener('click', closeModal);
        document.getElementById('opt-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

        // ── SUBMIT ───────────────────────────────────────────────────────────
        document.getElementById('submit-order-btn').onclick = async () => {
            const name = document.getElementById('cust-name').value;
            if (!name) return alert("Please enter your name.");
            const keys = Object.keys(cart);
            if (!keys.length) return alert("Your cart is empty.");
            const btn = document.getElementById('submit-order-btn');
            btn.disabled = true; btn.innerText = "Securing Payment...";

            const items = []; let total = 0;
            keys.forEach(key => {
                const e = cart[key];
                for (let i = 0; i < e.qty; i++) {
                    items.push({ name: e.name, price: e.price, variantLabel: e.variantLabel || null, subOption: e.subOption || null });
                    total += e.price;
                }
            });

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    items, customer: { name, phone: document.getElementById('cust-phone').value, msg: document.getElementById('cust-note').value },
                    paymentStatus: 'UNPAID', status: 'pending', type: currentMode === 'PIES' ? 'PRE-ORDER' : 'PICKUP', createdAt: serverTimestamp()
                });
                const response = await fetch('https://us-central1-chipsand-13831.cloudfunctions.net/createCheckout', {
                    method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { orderId: docRef.id, amount: Math.round(total * 100) } })
                });
                const result = await response.json();
                if (result.data?.url) window.location.href = result.data.url;
                else throw new Error('No URL');
            } catch (e) {
                alert("Payment error. Try again.");
                btn.disabled = false; btn.innerText = "Pay & Confirm Order";
            }
        };

        // ── MENU LOAD ────────────────────────────────────────────────────────
        function loadMenu() {
            onSnapshot(collection(db, "menu"), (snap) => {
                const display = document.getElementById('menu-display'); display.innerHTML = "";
                const items = []; snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                items.sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99));

                // Respect saved category order, fall back to order in data
                const orderedCats = catOrder.length
                    ? [...new Set([...catOrder, ...items.map(i => i.category)])]
                    : [...new Set(items.map(i => i.category))];

                orderedCats.forEach(cat => {
                    const catItems = items.filter(i => i.category === cat && i.is_available);
                    if ((currentMode === 'PIES' && cat !== 'PIES') || (currentMode === 'MENU' && cat === 'PIES')) return;
                    if (!catItems.length) return;

                    display.innerHTML += `<div class="cat-title">${cat}</div>`;
                    catItems.forEach(item => {
                        const card = document.createElement('div'); card.className = 'item-card';

                        const info = document.createElement('div'); info.className = 'item-info';
                        const nameEl = document.createElement('strong'); nameEl.innerText = item.name;
                        info.appendChild(nameEl);

                        const hasVariants   = item.variants   && item.variants.length > 0;
                        const hasSubOptions = item.subOptions && item.subOptions.length > 0;

                        const priceEl = document.createElement('div');
                        priceEl.style.cssText = 'font-size:0.9rem;color:var(--orange);margin-top:2px;';
                        if (hasVariants) {
                            priceEl.innerText = item.variants.map(v => v.label + ' £' + parseFloat(v.price).toFixed(2)).join(' / ');
                        } else {
                            priceEl.innerText = '£' + parseFloat(item.price).toFixed(2);
                        }
                        info.appendChild(priceEl);

                        if (hasSubOptions) {
                            const hint = document.createElement('div'); hint.className = 'item-sub-hint';
                            hint.innerText = 'Choice of: ' + item.subOptions.join(' or ');
                            info.appendChild(hint);
                        }

                        const addBtn = document.createElement('button'); addBtn.className = 'add-btn'; addBtn.innerText = '+';
                        addBtn.addEventListener('click', () => {
                            if (hasVariants) {
                                showModal(item.name, 'Choose a size / quantity:', item.variants.map(v => ({
                                    label: v.label + ' — £' + parseFloat(v.price).toFixed(2),
                                    onSelect: () => addToCart(item.name, v.price, v.label, null)
                                })));
                            } else if (hasSubOptions) {
                                showModal(item.name, 'Choose one:', item.subOptions.map(opt => ({
                                    label: opt,
                                    onSelect: () => addToCart(item.name, item.price, null, opt)
                                })));
                            } else {
                                addToCart(item.name, item.price, null, null);
                            }
                        });

                        card.appendChild(info); card.appendChild(addBtn);
                        display.appendChild(card);
                    });
                });
            });
        }
    </script>
</body>
</html>
