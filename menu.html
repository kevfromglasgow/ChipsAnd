        .add-btn {

            font-weight: bold;

        /* Cart Bar */
        #cart-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--brand-dark); 
            padding: 20px; 
            border-top: 4px solid var(--brand-orange); 
            display: none; 
            box-sizing: border-box; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .total-row { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; text-align: center; }
        
        .btn-group { display: flex; gap: 10px; }
        .pay-btn { 
            flex: 1; 
            padding: 18px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #closed-screen { display: none; text-align: center; padding: 100px 20px; }
    </style>
